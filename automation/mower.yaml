#################################################################
## Lawn Mower Automations
#################################################################

        ##########################################################
        ## Return Mower When Not Home
        ##########################################################

- alias: Mower - Return Mower When Not Home
  id: 'mower_return_mower_when_not_home'

  triggers:
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'mowing'
      for:
        hours: 0
        minutes: 0
        seconds: 10

  conditions:
    - condition: or
      conditions:
      #- condition: not
      #  conditions:
      #  - condition: state
      #    entity_id: person.USER1
      #    state: 'home'
      - condition: not
        conditions:
        - condition: state
          entity_id: group.household
          state: 'home'

  actions:
    - action: lawn_mower.dock
      data: {}
      target:
        entity_id:
          - lawn_mower.mower

        ##########################################################
        ## Return Mower When Raining
        ##########################################################

- alias: Mower - Return Mower When Raining
  id: 'mower_return_mower_when_raining'

  triggers:
    - trigger: state
      entity_id: weather.REDACTED
      to: 'rainy'
      for:
        hours: 0
        minutes: 1
        seconds: 0
    - trigger: state
      entity_id: weather.REDACTED
      to: 'lightning-rainy'
      for:
        hours: 0
        minutes: 1
        seconds: 0

  conditions:
    - condition: state
      entity_id: lawn_mower.mower
      state: 'mowing'

  actions:
    - action: lawn_mower.dock
      data: {}
      target:
        entity_id:
          - lawn_mower.mower

        ##########################################################
        ## Reload Integration if Not Updating
        ##########################################################

- alias: Mower - Reload Integration if Not Updating
  id: 'mower_reload_integration_if_not_updating'

  triggers:
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'mowing'
      for:
        hours: 1
        minutes: 30
        seconds: 0
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'mowing'
      for:
        hours: 1
        minutes: 45
        seconds: 0
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'mowing'
      for:
        hours: 2
        minutes: 0
        seconds: 0
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'returning'
      for:
        hours: 0
        minutes: 10
        seconds: 0
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'returning'
      for:
        hours: 0
        minutes: 15
        seconds: 0
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'returning'
      for:
        hours: 0
        minutes: 30
        seconds: 0
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'error'
      for:
        hours: 0
        minutes: 5
        seconds: 0
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'error'
      for:
        hours: 0
        minutes: 15
        seconds: 0
    - trigger: state
      entity_id: lawn_mower.mower
      to: 'error'
      for:
        hours: 0
        minutes: 30
        seconds: 0

  actions:
    - action: homeassistant.reload_config_entry
      data: {}
      target:
        device_id: 
          - 2292821b0dc65bb54b4b609283cf059c
