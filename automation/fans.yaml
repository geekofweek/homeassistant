- alias: Fan - Turn On Primary Bathroom Toilet Exhaust Fan if Motion Detected
  id: 'fan_turn_on_primary_bathroom_toilet_exhaust_fan_if_motion_detected'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bathroom_toilet_motion_sensor_motion_detection
      to: 'on'
      for:
        hours: 0
        minutes: 5
        seconds: 0
    - trigger: state
      entity_id: binary_sensor.primary_bathroom_toilet_door_sensor
      to: 'off'
      for:
        hours: 0
        minutes: 3
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_exhaust_fan_automations
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: switch.primary_bathroom_toilet_exhaust_fan
      state: 'off'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'
    - condition: state
      entity_id: input_boolean.USER2_bedtime
      state: 'off'

  actions:
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.primary_bathroom_toilet_exhaust_fan
  
  #################################################################
  ## Turn Off Primary Bathroom Toilet Exhaust Fan After No Motion Detected
  #################################################################

- alias: Fan - Turn Off Primary Bathroom Toilet Exhaust Fan After No Motion Detected
  id: 'fan_turn_off_primary_bathroom_toilet_exhaust_fan_after_no_motion_detected'

