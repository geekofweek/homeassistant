#################################################################
## Fan Automations
#################################################################

#################################################################
## Bathroom Exhaust Fans
#################################################################

  #################################################################
  ## Turn On Primary Bathroom Shower Exhaust Fan when Shower On
  #################################################################

- alias: Fan - Turn On Primary Bathroom Shower Exhaust Fan On when Shower On
  id: 'fan_primary_bathroom_shower_exhaust_fan_on_when_shower_on'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bathroom_shower_on
      to: 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 15
    - trigger: numeric_state
      entity_id: sensor.primary_bathroom_motion_sensor_humidity
      above: 72
      for:
        hours: 0
        minutes: 1
        seconds: 0


  conditions:
    - condition: state
      entity_id: input_boolean.disable_exhaust_fan_automations
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'
    - condition: state
      entity_id: binary_sensor.primary_bathroom_door_sensor
      state: 'off'

  actions:
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.primary_bathroom_shower_exhaust_fan
          - switch.primary_bathroom_toilet_exhaust_fan

  #################################################################
  ## Turn Off Primary Bathroom Shower Exhaust Fan when Shower Off
  #################################################################

- alias: Fan - Turn Off Primary Bathroom Shower Exhaust Fan when Shower Off
  id: 'fan_primary_bathroom_shower_exhaust_fan_off_when_shower_off'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bathroom_shower_on
      to: 'off'
      for:
        hours: 0
        minutes: 10
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_exhaust_fan_automations
      state: 'off'
    - condition: state
      entity_id: switch.primary_bathroom_shower_exhaust_fan
      state: 'on'

  actions:
    - action: switch.turn_off
      data: {}
      target:
        entity_id:
          - switch.primary_bathroom_shower_exhaust_fan
          - switch.primary_bathroom_toilet_exhaust_fan

  #################################################################
  ## Turn On Primary Bathroom Toilet Exhaust Fan if Motion Detected
