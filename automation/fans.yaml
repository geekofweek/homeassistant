        ##########################################################
        ## Turn Off Exhaust Fans After Timeout
        ##########################################################

- alias: Fans - Turn Off Exhaust Fans After Timeout
  id: 'fans_turn_off_exhaust_fans_after_timeout'
  
  mode: parallel
  triggers:
    - trigger: state
      entity_id:
        - switch.primary_bathroom_shower_exhaust_fan
        - switch.primary_bathroom_toilet_exhaust_fan
        - switch.upstairs_bathroom_toilet_exhaust_fan
        - switch.basement_bathroom_exhaust_fan
        - switch.guest_bathroom_exhaust_fan
        - switch.guest_bathroom_toilet_exhaust_fan
      to: 'on'
      for:
        hours: 0
        minutes: 45
        seconds: 0

  actions:
    - action: switch.turn_off
      data: {}
      target:
        entity_id: "{{ trigger.entity_id }}"

#################################################################
## Ceiling Fans
#################################################################

        ##########################################################
        ## Turn On USER1's Office Fans When Motion Detected
        ##########################################################

- alias: Fans - Turn On USER1's Office Fans When Motion Detected
  id: 'fans_turn_on_USER1_office_fans_when_motion_detected'

  triggers:
    - trigger: state
      entity_id: binary_sensor.USER1_s_office_occupancy
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_fan_automations
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: switch.USER1s_office_air_purifier
        state: 'off'
      - condition: state
        entity_id: fan.USER1s_office_ceiling_fan
        state: 'off'
    - condition: state
      entity_id: person.USER1
      state: 'home'
    - condition: not
      conditions:
      - condition: state
        entity_id: vacuum.upstairs
        state: 'cleaning'
      - condition: state
        entity_id: vacuum.upstairs
        state: 'returning'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'

  actions:
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.USER1_s_office_ceiling_fan
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.USER1s_office_air_purifier
    - action: fan.turn_on
      data: {}
      target:
        entity_id:
          - fan.USER1s_office_ceiling_fan
    - delay: '00:00:05'
    - action: fan.set_percentage
      data:
        percentage: 66
      target:
        entity_id: 
          - fan.USER1s_office_ceiling_fan

        ##########################################################
        ## Turn Off USER1's Office Fans When No Motion Detected
        ##########################################################

- alias: Fans - Turn Off USER1's Office Fans When Motion Detected
  id: 'fans_turn_off_USER1_office_fans_when_motion_detected'

  triggers:
    - trigger: state
      entity_id: binary_sensor.USER1_s_office_occupancy
      to: 'off'
      for:
        hours: 0
        minutes: 5
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_fan_automations
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: switch.USER1s_office_air_purifier
        state: 'on'
      - condition: state
        entity_id: fan.USER1s_office_ceiling_fan
        state: 'on'
    - condition: state
      entity_id: binary_sensor.USER1_s_office_door_sensor
      state: 'on'

  actions:
    - action: switch.turn_off
      data: {}
      target:
        entity_id:
          - switch.USER1s_office_air_purifier
    - action: fan.turn_off
      data: {}
      target:
        entity_id:
          - fan.USER1s_office_ceiling_fan

        ##########################################################
        ## Turn On USER2's Office Fans When Motion Detected
        ##########################################################

- alias: Fans - Turn On USER2's Office Fans When Motion Detected
  id: 'fans_turn_on_USER2_office_fans_when_motion_detected'

  triggers:
    - trigger: state
      entity_id: binary_sensor.USER2_s_office_motion_sensor_motion_detection
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_fan_automations
      state: 'off'
    - condition: state
      entity_id: fan.USER2s_office_ceiling_fan
      state: 'off'
    - condition: state
      entity_id: person.USER2
      state: 'home'
    - condition: not
      conditions:
      - condition: state
        entity_id: vacuum.upstairs
        state: 'cleaning'
      - condition: state
        entity_id: vacuum.upstairs
        state: 'returning'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'
    - condition: state
      entity_id: input_boolean.USER2_bedtime
      state: 'off'
    - condition: not
      conditions:
      - condition: state
        entity_id: climate.upstairs
