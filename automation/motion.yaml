        ## Turn On Primary Bathroom Lights when Motion Detected Morning
        ##########################################################

- alias: Motion - Turn On Primary Bathroom Lights when Motion Detected Morning
  id: 'motion_turn_on_primary_bathroom_lights_when_motion_detected_morning'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bathroom_motion_sensor_motion_detection
      from: 'off'
      to: 'on'
    - trigger: state
      entity_id: binary_sensor.primary_bathroom_door_sensor
      from: 'on'
      to: 'off'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_motion_automations
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: time
      after: '06:30:00'
      before: '09:30:00'
    - condition: state
      entity_id: light.primary_bathroom_lighting
      state: 'off'
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.main_floor_current_room
        state: "Bathroom"

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.primary_bathroom_shower
      data:
        brightness_pct: 100
        transition: 30
    - action: light.turn_on
      target:
        entity_id:
          - light.primary_bathroom_vanity
      data:
        brightness_pct: 100
        transition: 30
    - action: light.turn_on
      target:
        entity_id:
          - light.primary_bathroom_chandelier
      data:
        brightness_pct: 50
        transition: 30

