        ##########################################################

- alias: Motion - Turn On Kitchen Lights when Motion Detected Daytime
  id: 'motion_turn_on_kitchen_lights_when_motion_detected_daytime'

  triggers:
    - trigger: state
      entity_id: binary_sensor.kitchen_occupancy
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_motion_automations
      state: 'off'
    - condition: state
      entity_id: light.kitchen_lights
      state: 'off'
    - condition: state
      entity_id: sun.sun
      state: 'above_horizon'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.main_floor_current_room
        state: "Kitchen"
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.kitchen_lights
      data:
        brightness_pct: 40
        transition: 1
    - delay: '00:00:02'
    - action: light.turn_on
      target:
        entity_id:
          - light.kitchen_sink
      data:
        brightness_pct: 100
        transition: 1
  
