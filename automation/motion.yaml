#################################################################
## Main Floor
#################################################################

        ##########################################################
        ## Turn On Bedroom Lights when Motion Detected Daytime
        ##########################################################

- alias: Motion - Turn On Bedroom Lights when Motion Detected Daytime
  id: 'motion_turn_on_bedroom_lights_when_motion_detected_daytime'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bedroom_occupancy
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_motion_automations
      state: 'off'
    - condition: state
      entity_id: light.primary_bedroom_lights
      state: 'off'
    - condition: state
      entity_id: sun.sun
      state: 'above_horizon'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.main_floor_current_room
        state: "Bedroom"
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'
    - condition: state
      entity_id: input_boolean.USER2_bedtime
      state: 'off'
    - condition: state
      entity_id: binary_sensor.primary_bedroom_door_sensor
      state: 'on'
      for:
        hours: 0
        minutes: 15
        seconds: 0

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.primary_bedroom_lights
      data:
        brightness_pct: 50
        transition: 1

        ##########################################################
        ## Turn On Bedroom Lights when Motion Detected Night
        ##########################################################

- alias: Motion - Turn On Bedroom Lights when Motion Detected Night
  id: 'motion_turn_on_bedroom_lights_when_motion_detected_night'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bedroom_occupancy
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_motion_automations
      state: 'off'
    - condition: state
      entity_id: light.primary_bedroom_lights
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: sun.sun
        state: 'below_horizon'
      - condition: sun
        after: sunset
        after_offset: "-00:45:00"
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.main_floor_current_room
        state: "Bedroom"
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'
    - condition: state
      entity_id: input_boolean.USER2_bedtime
      state: 'off'
    - condition: state
      entity_id: binary_sensor.primary_bedroom_door_sensor
      state: 'on'
      for:
        hours: 0
        minutes: 15
        seconds: 0

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.primary_bedroom_lights
      data:
        brightness_pct: 100
        transition: 1

        ##########################################################
        ## Turn Off Bedroom Lights When No Motion Detected
        ##########################################################

- alias: Motion - Turn Off Bedroom Lights When No Motion Detected
  id: 'motion_turn_off_bedroom_ights_when_no_motion_detected'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bedroom_occupancy
      to: 'off'
      for:
        hours: 0
        minutes: 5
        seconds: 0
  
  conditions:
    - condition: state
      entity_id: input_boolean.disable_motion_automations
      state: 'off'
    - condition: state
      entity_id: light.primary_bedroom_lights
      state: 'on'
    - condition: state
      entity_id: binary_sensor.primary_bedroom_door_sensor
      state: 'on'
      for:
        hours: 0
        minutes: 10
        seconds: 0

  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.primary_bedroom_lights
      data:
        transition: 1

