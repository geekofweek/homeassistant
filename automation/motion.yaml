        hours: 0
        minutes: 40
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_motion_automations
      state: 'off'
    - condition: not
      conditions:
      - condition: state
        entity_id: select.media_room_activities
        state: 'power_off'
    - condition: not
      conditions:
      - condition: state
        entity_id: select.media_room_activities
        state: 'Play Xbox'
    - condition: not
      conditions:
      - condition: state
        entity_id: select.media_room_activities
        state: 'Play Nintendo Switch'
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.media_room_apple_tv
        state: 'playing'
    - condition: state
      entity_id: media_player.media_room_lg_tv
      state: 'on'

  actions:
    - action: select.select_option
      data:
        entity_id: select.media_room_activities
        option: "power_off"
    - action: media_player.turn_off
      data: {}
      target:
        entity_id:
          - media_player.media_room_apple_tv
          - media_player.media_room_lg_tv

