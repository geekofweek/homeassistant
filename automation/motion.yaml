        ## Turn On Game Room Lights When Motion Detected
        ##########################################################

- alias: Motion - Turn On Game Room Lights When Motion Detected
  id: 'motion_turn_on_game_room_lights_when_motion_detected'

  triggers:
    - trigger: state
      entity_id: binary_sensor.game_room_occupancy
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_motion_automations
      state: 'off'
    - condition: state
      entity_id: light.game_room_lights
      state: 'off'
    - condition: or
      conditions:
        - condition: state
          entity_id: group.household
          state: 'home'
        - condition: state
          entity_id: vacuum.basement
          state: 'cleaning'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.game_room_main_lights
      data:
        brightness_pct: 100
        transition: 1
    - action: light.turn_on
      data:
        brightness_pct: 100
        effect: Fall
      target:
        entity_id: 
          - light.jupiter_globe

