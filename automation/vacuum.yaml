- alias: Vacuum - Main Floor Full Clean
  id: 'vacuum_main_floor_full_clean'

  triggers:
    - trigger: state
      entity_id: input_boolean.main_floor_full_clean
      from: 'off'
      to: 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 15

  conditions:
    - condition: state
      entity_id: input_boolean.disable_vacuum_automations
      state: 'off'
    - condition: state
      entity_id: binary_sensor.main_floor_cleaning
      state: 'off'
    - condition: state
      entity_id: vacuum.main_floor
      state: 'docked'
    - condition: state
      entity_id: sensor.main_floor_vacuum_error
      state: 'none'

  actions:
    - action: button.press
      data: {}
      target:
        entity_id:
          - button.main_floor_full_vacuum
    - delay: '00:01:00'
    - action: homeassistant.turn_on
      data: {}
      target:
