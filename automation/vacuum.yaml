        ##########################################################
        ## Main Floor Clean when Away
        ##########################################################

- alias: Vacuum - Main Floor Clean when Away
  id: 'vacuum_main_floor_clean_when_away'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'home'
      to: 'not_home'
      for:
        hours: 0
        minutes: 1
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_vacuum_automations
      state: 'off'
    - condition: state
      entity_id: binary_sensor.main_floor_cleaning
      state: 'off'
    - condition: state
      entity_id: sensor.main_floor_vacuum_error
      state: 'none'
    - condition: state
      entity_id: vacuum.main_floor
      state: 'docked'
    - condition: state
      entity_id: input_boolean.out_of_town_mode
      state: 'off'

  actions:
    - action: vacuum.send_command
      data:
        command: app_segment_clean
        params:
          - segments:
              - 8
              - 2
              - 11
              - 6
              - 4
            repeat: 1
      target:
        entity_id: 
          - vacuum.main_floor

