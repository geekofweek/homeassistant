        ##########################################################

- alias: Vacuum - Stuck iOS Notification
  id: 'vacuum_stuck_ios_notification'

  mode: parallel
  triggers:
    - trigger: state
      entity_id: vacuum.main_floor
      to: 'error'
      for:
        hours: 0
        minutes: 5
        seconds: 0
    - trigger: state
      entity_id: vacuum.upstairs
      to: 'error'
      for:
        hours: 0
        minutes: 5
        seconds: 0
    - trigger: state
      entity_id: vacuum.four_season_room
      to: 'error'
      for:
        hours: 0
        minutes: 5
        seconds: 0
    - trigger: state
      entity_id: vacuum.basement
      to: 'error'
      for:
        hours: 0
        minutes: 5
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_vacuum_automations
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: "{{ trigger.to_state.attributes.friendly_name }} is Stuck, Please Help"

