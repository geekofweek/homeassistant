#################################################################
## Vacuum Automations
#################################################################

        ##########################################################
        ## Run Vacuums Out of Town Mode
        ##########################################################

- alias: Vacuum - Out of Town Mode Clean
  id: 'vacuum_out_of_town_mode_clean'

  triggers:
   - trigger: time
     at: '09:30:00'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_vacuum_automations
      state: 'off'
    - condition: time
      weekday:
        - mon
        - wed
        - fri
        - sun
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'off'
    - condition: or
      conditions:
      - condition: not
        conditions:
        - condition: state
          entity_id: group.household
          state: 'home'
      - condition: state
        entity_id: input_boolean.out_of_town_mode
        state: 'on'

  actions:
    - action: button.press
      data: {}
      target:
        entity_id:
          - button.main_floor_full_vacuum
    - action: vacuum.start
      data: {}
      target:
        entity_id:
          - vacuum.four_season_room
          - vacuum.upstairs
    - action: homeassistant.turn_on
      data: {}
      target:
        entity_id: 
          - input_boolean.roomba_clean_media_room
          - input_boolean.roomba_clean_basement_bathroom
          - input_boolean.roomba_clean_game_room
    - delay: '00:00:02'
    - action: python_script.basement_roomba

