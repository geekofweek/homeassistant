#################################################################
## Turn Wall Panel Screen Off When No Motion Detected
#################################################################

- alias: Wall Panel - Turn Wall Panel Screen Off When No Motion Detected
  id: 'wall_panel_turn_screen_off_no_motion_detected'

  triggers:
    - platform: state
      entity_id: binary_sensor.wall_panel_motion
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 7
        seconds: 0
    - platform: state
      entity_id: binary_sensor.wall_panel_motion
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 20
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: switch.kitchen_wall_panel_screen
      state: 'on'
    - condition: state
      entity_id: switch.kitchen_wall_panel_switch
      state: 'on'

  actions:
    - action: switch.turn_off
      data: {}
      target:
        entity_id:
          - switch.kitchen_wall_panel_screen

#################################################################
## Turn Wall Panel Screen On When Bedtime Off
#################################################################

- alias: Wall Panel - Turn Kitchen Screen On When Bedtime Off
  id: 'wall_panel_turn_kitchen_screen_on_when_bedtime_off'

  triggers:
    - platform: state
      entity_id: input_boolean.bedtime
      to: 'off'
      for:
        hours: 0
        minutes: 0
        seconds: 30

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: switch.kitchen_wall_panel_screen
      state: 'off'
    - condition: state
      entity_id: switch.kitchen_wall_panel_switch
      state: 'on'

  actions:
    - action: switch.turn_off
      data: {}
      target:
        entity_id:
          - switch.kitchen_wall_panel_maintenance_mode
    - delay: '00:00:02'
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.kitchen_wall_panel_screen
    - delay: '00:00:15'
    - action: button.press
      data: {}
      target:
        entity_id:
          - button.kitchen_wall_panel_restart_browser

#################################################################
## Turn Wall Panel Power On When Bedtime Off
#################################################################

- alias: Wall Panel - Turn Kitchen Power On When Bedtime Off
  id: 'wall_panel_turn_kitchen_power_on_when_bedtime_off'

  triggers:
    - platform: state
      entity_id: input_boolean.bedtime
      to: 'off'
      for:
        hours: 0
        minutes: 0
        seconds: 30

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: switch.kitchen_wall_panel_switch
      state: 'off'

  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: sun.sun
              state:
                - above_horizon
          sequence:
            - action: switch.turn_on
              metadata: {}
              target:
                entity_id: switch.kitchen_wall_panel_switch
              data: {}
            - delay:
                hours: 0
                minutes: 1
                seconds: 0
                milliseconds: 0
            - action: input_button.press
              metadata: {}
              target:
                entity_id: input_button.kitchen_wall_panel_light_mode
              data: {}
        - conditions:
            - condition: state
              entity_id: sun.sun
              state:
                - below_horizon
          sequence:
            - action: switch.turn_on
              metadata: {}
              target:
                entity_id: switch.kitchen_wall_panel_switch
              data: {}
            - delay:
                hours: 0
                minutes: 1
                seconds: 0
                milliseconds: 0
            - action: input_button.press
              metadata: {}
              data: {}
              target:
                entity_id: input_button.kitchen_wall_panel_dark_mode

