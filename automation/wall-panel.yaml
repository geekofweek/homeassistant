#################################################################
## Kitchen Wall Panel Restart if Offline
#################################################################

- alias: Wall Panel - Kitchen Restart if Offline
  id: 'wall_panel_kitchen_restart_if_offline'

  description: "Restart Kitchen Wall Panel if Offline"
  mode: single
  triggers:
    - trigger: state
      entity_id: device_tracker.kitchen_wall_panel_network
      to: 'not_home'
      for:
        hours: 0
        minutes: 2
        seconds: 0
    - trigger: state
      entity_id: device_tracker.kitchen_wall_panel_network
      to: 'unavailable'
      for:
        hours: 0
        minutes: 2
        seconds: 0
    - trigger: state
      entity_id: switch.kitchen_wall_panel_screen
      to: 'unavailable'
      for:
        hours: 0
        minutes: 2
        seconds: 0

  conditions:
    - condition: state
      entity_id: switch.kitchen_wall_panel_switch
      state: 'on'
    - condition: state
      entity_id: input_boolean.out_of_town_mode
      state: 'off'

  actions:
    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_boolean.bedtime
                  state:
                    - "on"
                - condition: state
                  entity_id: group.household
                  state:
                    - not_home
          sequence:
            - action: switch.turn_off
              metadata: {}
              target:
                entity_id: switch.kitchen_wall_panel_switch
              data: {}
            - delay:
                hours: 0
                minutes: 0
                seconds: 30
                milliseconds: 0
            - action: switch.turn_on
              metadata: {}
              target:
                entity_id: switch.kitchen_wall_panel_switch
              data: {}
            - delay:
                hours: 0
                minutes: 2
                seconds: 0
                milliseconds: 0
            - action: switch.turn_off
              metadata: {}
              target:
                entity_id: switch.kitchen_wall_panel_screen
              data: {}
            - action: notify.USER1_devices
              metadata: {}
              data:
                message: Wall Panel Offline - Restarting
        - conditions:
            - condition: state
              entity_id: input_boolean.bedtime
              state:
                - "off"
            - condition: state
              entity_id: group.household
              state:
                - home
          sequence:
            - action: switch.turn_off
              metadata: {}
              target:
                entity_id: switch.kitchen_wall_panel_switch
              data: {}
            - delay:
                hours: 0
                minutes: 0
                seconds: 30
                milliseconds: 0
            - action: switch.turn_on
              metadata: {}
              target:
                entity_id: switch.kitchen_wall_panel_switch
              data: {}
            - action: notify.USER1_devices
              metadata: {}
              data:
                message: Wall Panel Offline - Restarting

        ##########################################################
        ## Disable Maintenance Mode when USER1 or USER2 Home
        ##########################################################

- alias: Wall Panel - Disable Maintenance Mode when USER1 or USER2 Home
  id: 'wall_panel_disable_maintenance_mode_when_USER1_or_USER2_home'

  triggers:
    - trigger: state
      entity_id: person.USER1
      from: 'not_home'
      to: 'home'
    - trigger: state
      entity_id: person.USER2
      from: 'not_home'
      to: 'home'

  conditions:
      - condition: state
        entity_id: switch.kitchen_wall_panel_maintenance_mode
        state: 'on'

  actions:
    - action: switch.turn_off
      data: {}
      target:
        entity_id:
          - switch.kitchen_wall_panel_maintenance_mode