            - condition: state
              entity_id: switch.kitchen_wall_panel_screen
              state:
                - "on"
          sequence:
            - action: switch.turn_on
              metadata: {}
              target:
                entity_id: switch.kitchen_wall_panel_maintenance_mode
              data: {}
            - delay:
                hours: 0
                minutes: 0
                seconds: 1
                milliseconds: 0
            - action: rest_command.kitchen_wall_panel_dark_mode_on
              metadata: {}
              data: {}
            - delay:
                hours: 0
                minutes: 0
                seconds: 2
                milliseconds: 0
            - action: button.press
              metadata: {}
              target:
                entity_id: button.kitchen_wall_panel_restart_browser
              data: {}
            - delay:
                hours: 0
                minutes: 0
                seconds: 10
                milliseconds: 0
            - action: input_button.press
              metadata: {}
              target:
                entity_id: button.kitchen_wall_panel_load_start_url
              data: {}
            - action: switch.turn_off
              metadata: {}
              target:
                entity_id: 
                  - switch.kitchen_wall_panel_maintenance_mode
              data: {}

