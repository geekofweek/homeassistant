              data: {}
            - delay:
                hours: 0
                minutes: 0
                seconds: 5
                milliseconds: 0
            - action: switch.turn_off
              metadata: {}
              target:
                entity_id: 
                  - switch.kitchen_wall_panel_maintenance_mode
