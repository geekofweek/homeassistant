#################################################################
## iOS Actions
#################################################################

  actions:

        #################################################################
        ## Bedtime
        #################################################################

    - name: Bedtime
      background_color: "#ffffff"
      label:
        text: "Bedtime"
        color: "#000000"
      icon:
        icon: bed
        color: "#46A7F3"
      show_in_carplay: false
      show_in_watch: true
      use_custom_colors: true

        #################################################################
        ## Disarm Alarm
        #################################################################

    - name: Disarm Alarm
      background_color: "#ffffff"
      label:
        text: "Disable Alarm"
        color: "#000000"
      icon:
        icon: shield_home
        color: "#ff0000"
      show_in_carplay: true
      show_in_watch: true
      use_custom_colors: true

        #################################################################
        ## Toggle Garage Door
        #################################################################

    - name: Toggle Garage Door
      background_color: "#ffffff"
      label:
        text: "Garage"
        color: "#000000"
      icon:
        icon: garage
        color: "#8E6EC6"
      show_in_carplay: true
      show_in_watch: true
      use_custom_colors: true

        #################################################################
        ## Unlock Garage Door
        #################################################################

    - name: Unlock Garage Door
      background_color: "#ffffff"
      label:
        text: "Unlock Garage Door"
        color: "#000000"
      icon:
        icon: lock-open
        color: "#ff0000"
      show_in_carplay: true
      show_in_watch: true
      use_custom_colors: true

        #################################################################
        ## Unlock Patio Door
        #################################################################

    - name: Unlock Patio Door
      background_color: "#ffffff"
      label:
        text: "Patio Door"
        color: "#000000"
      icon:
        icon: lock-open
        color: "#ff0000"
      show_in_carplay: false
      show_in_watch: true
      use_custom_colors: true

        #################################################################
        ## Lock Doors
        #################################################################

    - name: Lock Doors
      background_color: "#ffffff"
      label:
        text: "Lock Doors"
        color: "#000000"
      icon:
        icon: lock
        color: "#61AC51"
      show_in_carplay: true
      show_in_watch: true
      use_custom_colors: true