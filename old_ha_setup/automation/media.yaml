#################################################################
## Media Player Automations
#################################################################

        ##########################################################
        ## Media Room Watching TV Lights Off
        ##########################################################

- alias: Media - Media Room Watching TV Lights Off
  id: 'media_media_room_watching_tv_lights_off'

  triggers:
    - trigger: state
      entity_id: media_player.media_room_apple_tv
      to: 'playing'
      for:
        hours: 0
        minutes: 0
        seconds: 30

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.disable_media_automations
      state: 'off'
    - condition: state
      entity_id: select.media_room_activities
      state: "Watch TV"
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.media_room_apple_tv
        attribute: app_id
        state: "com.google.ios.youtube"
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.media_room_apple_tv
        attribute: app_name
        state: "YouTube"
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.media_room_apple_tv
        attribute: app_id
        state: "com.apple.TVPhotos"

  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.media_room_lights
          - light.basement_bathroom_vanity_lights
          - light.game_room_lights
          - light.basement_stairs_main_lights
          - light.jupiter_globe
      data:
       transition: 10
    - action: switch.turn_off
      data: {}
      target:
        entity_id:
          - switch.media_room_ap_led

        ##########################################################
        ## Media Room Watching TV Lights On Day
        ##########################################################

- alias: Media - Media Room Watching TV Lights On Day
  id: 'media_media_room_watching_tv_lights_on_day'

  triggers:
    - trigger: state
      entity_id: media_player.media_room_apple_tv
      to: 'paused'
      for:
        hours: 0
        minutes: 0
        seconds: 15
    - trigger: state
      entity_id: media_player.media_room_apple_tv
      to: 'idle'
      for:
        hours: 0
        minutes: 0
        seconds: 15

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.disable_media_automations
      state: 'off'
    - condition: state
      entity_id: sun.sun
      state: 'above_horizon'
    - condition: time
      after: '07:00:00'
      before: '22:00:00'
    - condition: state
      entity_id: select.media_room_activities
      state: "Watch TV"
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'

  actions:
    - action: light.turn_on
      entity_id: light.media_room_lights
      data:
       transition: 15
       brightness_pct: 100
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.media_room_ap_led

        ##########################################################
        ## Media Room Watching TV Lights On Evening
        ##########################################################

- alias: Media - Media Room Watching TV Lights On Evening
  id: 'media_media_room_watching_tv_lights_on_evening'

  triggers:
    - trigger: state
      entity_id: media_player.media_room_apple_tv
      to: 'paused'
      for:
        hours: 0
        minutes: 0
        seconds: 15
    - trigger: state
      entity_id: media_player.media_room_apple_tv
      to: 'idle'
      for:
        hours: 0
        minutes: 0
        seconds: 15

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.disable_media_automations
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: sun.sun
        state: 'below_horizon'
      - condition: sun
        after: sunset
        after_offset: "-00:45:00"
    - condition: time
      after: '07:00:00'
      before: '23:00:00'
    - condition: state
      entity_id: select.media_room_activities
      state: "Watch TV"
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'

  actions:
    - action: light.turn_on
      entity_id: 
        - light.media_room_lights
        - light.basement_stairs_main_lights
      data:
       transition: 60
       brightness_pct: 100
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.media_room_ap_led

        ##########################################################
        ## Media Room Watching TV Lights On Night
        ##########################################################

- alias: Media - Media Room Watching TV Lights On Night
  id: 'media_media_room_watching_tv_lights_on_night'

  triggers:
    - trigger: state
      entity_id: media_player.media_room_apple_tv
      to: 'paused'
      for:
        hours: 0
        minutes: 0
        seconds: 15
    - trigger: state
      entity_id: media_player.media_room_apple_tv
      to: 'idle'
      for:
        hours: 0
        minutes: 0
        seconds: 15

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.disable_media_automations
      state: 'off'
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'
    - condition: time
      after: '23:00:00'
      before: '07:00:00'
    - condition: state
      entity_id: select.media_room_activities
      state: "Watch TV"
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'

  actions:
    - action: light.turn_on
      entity_id: 
        - light.media_room_main_lights
      data:
       transition: 15
       brightness_pct: 30
    - action: light.turn_on
      entity_id: 
        - light.media_room_accent_lights
      data:
       transition: 60
       brightness_pct: 100
    - action: light.turn_on
      entity_id: 
        - light.basement_stairs_main_lights
      data:
       transition: 15
       brightness_pct: 25
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.media_room_ap_led

        ##########################################################
        ## Turn Off Media Room Lights When Playing Video Games
        ##########################################################

- alias: Media - Turn Off Media Room Lights When Playing Video Games
  id: 'media_turn_off_media_room_lights_when_playing_video_games'

  triggers:
    - trigger: state
      entity_id: select.media_room_activities
      to: "Play Xbox"
      for:
        hours: 0
        minutes: 1
        seconds: 0
    - trigger: state
      entity_id: select.media_room_activities
      to: "Play Nintendo Switch"
      for:
        hours: 0
        minutes: 1
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'

  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.media_room_main_lights
      data:
       transition: 5

        ##########################################################
        ## Turn On Media Room Lights When Done Playing Video Games
        ##########################################################

- alias: Media - Turn On Media Room Lights When Done Playing Video Games
  id: 'media_turn_on_media_room_lights_when_done_playing_video_games'

  triggers:
    - trigger: state
      entity_id: select.media_room_activities
      from: "Play Xbox"
      for:
        hours: 0
        minutes: 0
        seconds: 15
    - trigger: state
      entity_id: select.media_room_activities
      from: "Play Nintendo Switch"
      for:
        hours: 0
        minutes: 0
        seconds: 15

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.media_room_main_lights
      data:
       transition: 60
       brightness_pct: 50

