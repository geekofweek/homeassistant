        ##########################################################

- alias: Media - Turn On Media Room Speech Enhancement When Watching TV
  id: 'media_turn_on_media_room_speech_enhancement_when_watching_tv'

  triggers:
    - trigger: state
      entity_id: media_player.media_room_apple_tv
      to: 'playing'
      for:
        hours: 0
        minutes: 0
        seconds: 15

  conditions:
    - condition: state
      entity_id: switch.media_room_tv_sonos_speech_enhancement
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.media_room_apple_tv
        attribute: app_id
        state: "com.google.ios.youtube"
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.media_room_apple_tv
        attribute: app_name
        state: "YouTube"
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.living_room_apple_tv
        attribute: app_id
        state: "com.apple.TVMusic"
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.living_room_apple_tv
        attribute: app_name
        state: "Music"

  actions:
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.media_room_tv_sonos_speech_enhancement

