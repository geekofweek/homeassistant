        ##########################################################
        ## Turn On USER1's Office Moon Globe When Not Watching TV Day
        ##########################################################

- alias: Media - Turn Turn On USER1's Office Moon Globe When Not Watching TV Day
  id: 'media_turn_on_USER1_office_moon_globe_when_not_watching_tv_day'

  triggers:
    - trigger: state
      entity_id: media_player.USER1s_office_apple_tv
      from: 'playing'
      for:
        hours: 0
        minutes: 1
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_media_automations
      state: 'off'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'
    - condition: state
      entity_id: light.USER1_s_office_moon_globe
      state: 'off'
    - condition: state
      entity_id: person.USER1
      state: 'home'
    - condition: or
      conditions:
      - condition: state
        entity_id: sun.sun
        state: 'above_horizon'
      - condition: sun
        after: sunset
        before_offset: "-00:45:00"

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.USER1_s_office_moon_globe
      data:
        brightness_pct: 25
        color_temp_kelvin: 4201

