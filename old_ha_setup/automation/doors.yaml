#################################################################
## Notifications
#################################################################

        ##########################################################
        ## Door Left Open Notification
        ##########################################################

- alias: Doors - Door Left Open Notification
  id: 'doors_left_open_notification'

  mode: parallel
  triggers:
    - trigger: state
      entity_id: 
          - binary_sensor.garage_door_sensor
          - binary_sensor.patio_door_sensor
          - binary_sensor.front_door_sensor
      to: 'on'
      for:
        hours: 0
        minutes: 15
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: "{{ trigger.to_state.attributes.friendly_name }} Left Open!"