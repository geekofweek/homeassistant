        ##########################################################
        ## Household Away Mode Locks
        ##########################################################

- alias: Location - Household Away Mode Locks
  id: 'location_household_away_mode_locks'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'home'
      to: 'not_home'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_location_automations
      state: 'off'

  actions:
    - action: lock.lock
      data: {}
      target:
        entity_id:
        - lock.garage_door
        - lock.patio_door

