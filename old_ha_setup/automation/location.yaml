        ##########################################################
        ## Turn On Stair Lights When Home Before 9p
        ##########################################################

- alias: Location - Turn On Stair Lights When Home Before 9p
  id: 'location_turn_on_stair_lights_when_home_before_9p'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'not_home'
      to: 'home'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_location_automations
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: sun.sun
        state: 'below_horizon'
      - condition: sun
        after: sunset
        after_offset: "-00:45:00"
    - condition: time
      before: '21:00:00'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.stairs_main_lights
      data:
        brightness_pct: 75
        transition: 120
    - action: light.turn_on
      target:
        entity_id:
          - light.basement_stairs_main_lights
      data:
        brightness_pct: 100
        transition: 120

        ##########################################################
        ## Turn On Stair Lights When Home Before 11p
        ##########################################################

- alias: Location - Turn On Stair Lights When Home Before 11p
  id: 'location_turn_on_stair_lights_when_home_before_11p'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'not_home'
      to: 'home'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_location_automations
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: sun.sun
        state: 'below_horizon'
      - condition: sun
        after: sunset
        after_offset: "-00:45:00"
    - condition: time
      after: '21:00:00'
      before: '23:00:00'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.stairs_main_lights
      data:
        brightness_pct: 75
        transition: 120
    - action: light.turn_on
      target:
        entity_id:
          - light.basement_stairs_main_lights
      data:
        brightness_pct: 100
        transition: 120

        ##########################################################
        ## Turn On Stair Lights When Home After 11p
        ##########################################################

- alias: Location - Turn On Stair Lights When Home After 11p
  id: 'location_turn_on_stair_lights_when_home_after_11p'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'not_home'
      to: 'home'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_location_automations
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: sun.sun
        state: 'below_horizon'
      - condition: sun
        after: sunset
        after_offset: "-00:45:00"
    - condition: time
      after: '23:00:00'
      before: '02:00:00'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.stairs_main_lights
      data:
        brightness_pct: 25
        transition: 120
    - action: light.turn_on
      target:
        entity_id:
          - light.basement_stairs_main_lights
      data:
        brightness_pct: 100
        transition: 120

        ##########################################################
