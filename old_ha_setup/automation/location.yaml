        ##########################################################
        ## Household Away Mode Workshop Air Purfier
        ##########################################################

- alias: Location - Household Away Mode Workshop Air Purifier
  id: 'location_household_away_mode_workshop_air_purifier'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'home'
      to: 'not_home'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_location_automations
      state: 'off'
    - condition: state
      entity_id: switch.workshop_air_purifier
      state: 'on'
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.prusa_core_one_l
        state: 'printing'
      - condition: state
        entity_id: sensor.prusa_core_one
        state: 'printing'
      - condition: state
        entity_id: sensor.prusa_core_one_mmu
        state: 'printing'

  actions:
    - action: switch.turn_off
      data: {}
      target:
        entity_id:
          - switch.workshop_air_purifier

