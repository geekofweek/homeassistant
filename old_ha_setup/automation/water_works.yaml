#################################################################
## Water Sensor Automations
#################################################################

        ##########################################################
        ## Water Detected Notification
        ##########################################################

- alias: Water Works - Water Detected Notification
  id: 'water_works_water_detected_notification'

  mode: parallel
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.basement_drain_water_sensor_water_leak_detected
        - binary_sensor.water_heater_water_sensor_water_leak_detected
        - binary_sensor.washing_machine_water_sensor_water_leak_detected
        - binary_sensor.kitchen_sink_water_sensor_water_leak_detected
        - binary_sensor.utility_sink_water_sensor_water_leak_detected
      to: 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 5

  conditions:
    - condition: state
      entity_id: input_boolean.disable_water_works_automations
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: "{{ trigger.to_state.attributes.friendly_name }} Water Detected!"
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: water-works