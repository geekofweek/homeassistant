#################################################################
## Alarm Automations
#################################################################

#################################################################
## Arm / Disarm
#################################################################

        ##########################################################
        ## Disable Alarm when Home
        ##########################################################

- alias: Alarm - Disable Alarm when Home
  id: 'alarm_disable_alarm_when_home'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'not_home'
      to: 'home'

  conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'disarmed'

  actions:
    - action: alarm_control_panel.alarm_disarm
      entity_id: alarm_control_panel.alarm

        ##########################################################
        ## Disable Alarm when USER1 or USER2 Home
        ##########################################################

- alias: Alarm - Disable Alarm when USER1 or USER2 Home
  id: 'alarm_disable_alarm_when_USER1_or_USER2_home'

  triggers:
    - trigger: state
      entity_id: person.USER1
      from: 'not_home'
      to: 'home'
    - trigger: state
      entity_id: person.USER2
      from: 'not_home'
      to: 'home'

  conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'disarmed'

  actions:
    - action: alarm_control_panel.alarm_disarm
      entity_id: alarm_control_panel.alarm

        ##########################################################
        ## Enable Alarm when Away
        ##########################################################

- alias: Alarm - Enable Alarm when Away
  id: 'alarm_enable_alarm_when_away'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'home'
      to: 'not_home'
      for:
        hours: 0
        minutes: 5
        seconds: 0

  conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: group.household
        state: 'home'
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'off'
    - condition: state
      entity_id: alarm_control_panel.alarm
      state: 'disarmed'

  actions:
    - action: alarm_control_panel.alarm_arm_away
      entity_id: alarm_control_panel.alarm

        ##########################################################
        ## Arm Night at Bedtime
        ##########################################################

- alias: Alarm - Arm Night at Bedtime
  id: 'alarm_arm_night_at_bedtime'

  triggers:
    - trigger: state
      entity_id: input_boolean.bedtime
      from: 'off'
      to: 'on'
      for:
        hours: 0
        minutes: 5
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: alarm_control_panel.alarm
      state: 'disarmed'

  actions:
    - action: alarm_control_panel.alarm_arm_night
      entity_id: alarm_control_panel.alarm

        ##########################################################
        ## Disarm Alarm in the Morning Bedroom Door Open
        ##########################################################

- alias: Alarm - Disarm Alarm in the Morning Bedroom Door Open
  id: 'alarm_disarm_alarm_in_the_morning_bedroom_door_open'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bedroom_door_sensor
      to: 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 0
  
  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: time
      after: '05:00:00'
      before: '21:00:00'
    - condition: not
      conditions:
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'disarmed'

  actions:
    - action: alarm_control_panel.alarm_disarm
      entity_id: alarm_control_panel.alarm

        ##########################################################
        ## Disarm Alarm in the Morning When Motion Detected in Bedroom Hallway
        ##########################################################

- alias: Alarm - Disarm Alarm in the Morning When Motion Detected in Bedroom Hallway
  id: 'alarm_disarm_alarm_in_the_morning_when_motion_detected_in_bedroom_hallway'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bedroom_hallway_motion_sensor_motion_detection
      to: 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 0
  
  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: time
      after: '06:00:00'
      before: '21:00:00'
    - condition: not
      conditions:
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'disarmed'
    - condition: state
      entity_id: binary_sensor.main_floor_cleaning
      state: 'off'

  actions:
    - action: alarm_control_panel.alarm_disarm
      entity_id: alarm_control_panel.alarm

        ##########################################################
        ## Disarm Alarm if Lock Keypad Used
        ##########################################################

- alias: Alarm - Disarm Alarm if Lock Keypad Used
  id: 'alarm_disarm_alarm_if_lock_keypad_used'

  triggers:
    - trigger: state
      entity_id: sensor.garage_door_lock_alarm_type
      to: "19"
    - trigger: state
      entity_id: sensor.patio_door_lock_alarm_type
      to: "19"
  
  conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'disarmed'

  actions:
    - action: alarm_control_panel.alarm_disarm
      entity_id: alarm_control_panel.alarm

        ##########################################################
        ## Arm Alarm Vacation Mode
        ##########################################################

- alias: Alarm - Arm Alarm Vacation Mode
  id: 'alarm_arm_alarm_vacation_mode'

  triggers:
    - trigger: state
      entity_id: input_boolean.out_of_town_mode
      to: "on"
  
  conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'armed_vacation'

  actions:
    - action: alarm_control_panel.alarm_arm_vacation
      entity_id: alarm_control_panel.alarm

#################################################################
## Alarm Triggers
#################################################################

        ##########################################################
        ## Door Alarm
        ##########################################################

- alias: Alarm - Away Door
  id: 'alarm_away_door'

  triggers:
    - trigger: state
      entity_id: binary_sensor.doors
      from: 'off'
      to: 'on'
    - trigger: state
      entity_id: cover.garage_door
      to: 'open'
    - trigger: state
      entity_id: cover.four_season_room
      to: 'open'

  conditions:
    - condition: or
      conditions:
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'armed_away'
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'armed_vacation'
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'armed_home'
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'armed_night'

  actions:
    - action: notify.USER1_devices
      data:
        message: Door Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.driveway
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background
    - action: notify.USER2_devices
      data:
        message: Door Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.driveway
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background
    - action: alarm_control_panel.alarm_trigger
      target:
        entity_id:
          - alarm_control_panel.alarm

        #################################################################
        ## Motion Alarm
        #################################################################

- alias: Alarm - Motion Alarm Away
  id: 'alarm_motion_alarm_away'

  triggers:
    - trigger: state
      entity_id: binary_sensor.motion
      from: 'off'
      to: 'on'
      for:
        hours: 0
        minutes: 1
        seconds: 30

  conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: group.household
        state: 'home'
    - condition: or
      conditions:
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'armed_away'
      - condition: state
        entity_id: alarm_control_panel.alarm
        state: 'armed_vacation'
    - condition: state
      entity_id: vacuum.main_floor
      state: 'docked'
    - condition: state
      entity_id: vacuum.upstairs
      state: 'docked'
    - condition: state
      entity_id: vacuum.basement
      state: 'docked'
    - condition: state
      entity_id: vacuum.four_season_room
      state: 'docked'

  actions:
    - action: notify.USER1_devices
      data:
        message: Motion Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.driveway
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
#    - action: alarm_control_panel.alarm_trigger
#      entity_id:
#        - alarm_control_panel.alarm

#################################################################
## Alarm Trigger Actions
#################################################################

        ##########################################################
        ## Alarm Triggered Armed Away
        ##########################################################

- alias: Alarm - Triggered Armed Away
  id: 'alarm_triggered_armed_away'

  triggers:
    - trigger: state
      entity_id: alarm_control_panel.alarm
      to: 'triggered'

  conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: group.household
        state: 'home'
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'off'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.living_room_lights
          - light.kitchen_lights
          - light.four_season_room_lights
          - light.laundry_room_main_lights
          - light.dining_room_lights
          - light.hallway_main_lights
          - light.hallway_bathroom_vanity_lights
          - light.study_main_lights
          - light.bedroom_hallway_main_lights
          - light.primary_bedroom_lights
          - light.primary_bathroom_lights
          - light.primary_bedroom_closet
          - light.USER2_s_office_lights
          - light.USER1_s_office_lights
          - light.workshop_ceiling
          - light.guest_bedroom_lights
          - light.guest_bathroom_lights
          - light.upstairs_bathroom_lights
          - light.media_room_lights
          - light.game_room_lights
          - light.basement_bathroom_vanity_lights
          - light.fitness_room_main_lights
          - light.basement_storage_area_main_lights
          - light.stairs_main_lights
          - light.basement_stairs_main_lights
          - light.garage_interior
          - light.guest_bedroom_closet_light
          - light.USER1_s_office_closet_light
          - light.foyer_chandelier
      data:
       brightness_pct: 100
       color_name: "red"
       flash: long
    - action: siren.turn_on
      target:
        entity_id:
          - siren.siren
    - action: media_player.play_media
      target:
        entity_id: 
          - media_player.USER1_s_office_sonos
          - media_player.bathroom_sonos
          - media_player.bedroom_sonos
          - media_player.dining_room_sonos
          - media_player.four_season_room_sonos
          - media_player.four_season_room_tv_sonos
          - media_player.game_room_sonos
          - media_player.kitchen_sonos
          - media_player.laundry_room_sonos
          - media_player.living_room_sonos
          - media_player.media_room_sonos
          - media_player.media_room_tv_sonos
          - media_player.study_sonos
          - media_player.USER2_s_office_sonos
      data:
        announce: true
        media_content_id: >
          media-source://tts/cloud?message="You are not Authorized to be Here. Law Enforcement Has Been Notified!"
        media_content_type: "music"
        extra:
          volume: 85
    - action: notify.USER1_devices
      data:
        message: Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.driveway
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background
    - action: notify.USER2_devices
      data:
        message: Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.driveway
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background

