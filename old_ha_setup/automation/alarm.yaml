#################################################################
## Smoke Alarm
#################################################################

- alias: Alarm - CO Alarm Turn on Siren and Lights
  id: 'alarm_co_alarm_turn_on_siren_and_lights'

  triggers:
    - trigger: state
      entity_id: binary_sensor.smoke_alarm_carbon_monoxide_detected
      to: 'on'

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.bedroom_hallway_main_lights
          - light.primary_bedroom_lights
          - light.primary_bathroom_lights
          - light.primary_bedroom_closet
      data:
       brightness_pct: 100
    - action: siren.turn_on
      target:
        entity_id:
          - siren.siren

#################################################################
## Notifications
#################################################################

    #################################################################
    ## Alarm Armed Home iOS Notification
    #################################################################

- alias: Alarm - Armed iOS Notification
  id: 'alarm_armed_ios_notification'

  triggers:
    - trigger: state
      entity_id: alarm_control_panel.alarm
      to: 'armed_home'
    - trigger: state
      entity_id: alarm_control_panel.alarm
      to: 'armed_night'
    - trigger: state
      entity_id: alarm_control_panel.alarm
      to: 'armed_away'
    - trigger: state
      entity_id: alarm_control_panel.alarm
      to: 'armed_vacation'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: Alarm is Armed
        data:
          tag: alarm
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background

    #################################################################
    ## Alarm Disabled iOS Notification
    #################################################################

- alias: Alarm - Disabled iOS Notification
  id: 'alarm_disabled_ios_notification'

  triggers:
    - trigger: state
      entity_id: alarm_control_panel.alarm
      to: 'disarmed'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: Alarm is Disarmed
        data:
          tag: alarm
          actions:
            - action: "arm_alarm"
              title: "Arm Alarm System"
              destructive: true
              activationMode: background

        ##########################################################
        ## Siren Low Battery Notification
        ##########################################################

- alias: Alarm - Low Battery Notification
  id: 'alarm_low_battery_notification'

  triggers:
    - trigger: numeric_state
      entity_id: 
          - sensor.siren_batt
      below: 30
      for:
        hours: 1
        minutes: 0
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: Alarm {{ trigger.to_state.attributes.friendly_name }} Low Battery

