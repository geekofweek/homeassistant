   - trigger: time
     at: '02:00:00'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_interior_light_automations
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: light.stairs_main_lights
        state: 'on'
      - condition: state
        entity_id: light.basement_stairs_main_lights
        state: 'on'

  actions:
    - delay:
        minutes: '{{ range(2, 32) | random }}'
    - action: light.turn_off
      target:
        entity_id:
          - light.stairs_main_lights
      data:
        transition: 900
    - delay:
        minutes: '{{ range(2, 32) | random }}'
    - action: light.turn_off
      target:
        entity_id:
          - light.basement_stairs_main_lights
      data:
        transition: 900

        ##########################################################
        ## USER1's Office Lights on at Sunset
        ##########################################################

- alias: Lights - USER1's Office Lights on at Sunset
  id: 'lights_USER1s_office_lights_on_at_sunset'

  triggers:
    - trigger: sun
      event: 'sunset'
      offset: '-00:45:00'

  conditions:
    - condition: state
      entity_id: person.USER1
      state: 'home'
    - condition: state
      entity_id: binary_sensor.USER1_s_office_occupancy
      state: 'on'
    - condition: state
      entity_id: light.USER1_s_office_lights
      state: 'on'

  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.USER1_s_office_ceiling_fan
    - action: light.turn_on
      target:
        entity_id:
          - light.USER1_s_office_moon_globe
      data:
        brightness_pct: 75
        color_temp_kelvin: 4201
    - action: light.turn_on
      target:
        entity_id:
          - light.USER1_s_office_desk_accent
          - light.USER1_s_office_lamp
          - light.USER1_s_office_shelf_lamp
      data:
        transition: 60
        brightness_pct: 100
        color_temp_kelvin: 2700
    - action: light.turn_on
      target:
        entity_id:
          - light.USER1_s_office_accent_lamp
    - delay: '00:00:04'
    - action: light.turn_on
      target:
        entity_id:
          - light.USER1s_office_ceiling_fan

