      entity_id: input_boolean.disable_interior_light_automations
      state: 'off'
    - condition: state
      entity_id: light.kitchen_lights
      state: 'on'

  actions:
    - action: light.turn_on
      data: {}
      target:
        entity_id:
          - light.kitchen_cabinets
    - action: light.turn_on
      target:
        entity_id:
          - light.kitchen_sink
          - light.kitchen_main
          - light.kitchen_island
