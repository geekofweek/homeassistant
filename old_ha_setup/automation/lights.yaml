#################################################################
## Color Modes
#################################################################

        ##########################################################
        ## Media Room Accent Lighting Random Color Every 30 mins
        ##########################################################

- alias: Lights - Media Room Accent Lighting Random Color Every 30 Mins
  id: 'lights_media_room_accent_lighting_random_color_every_30_mins'

  triggers:
    - trigger: time_pattern
      minutes: '/30'

  conditions:
    - condition: state
      entity_id: light.media_room_accent_lights
      state: 'on'
    - condition: state
      entity_id: group.household
      state: 'home'

  actions:
    - action: light.turn_on
      target:
        entity_id: light.media_room_accent_lights
      data:
        transition: 300
        hs_color:
          - '{{ (range(0, 360)|random) }}'
          - '100'
        brightness_pct: 100

#################################################################
## Weather Based Lighting
#################################################################

        ##########################################################
        ## Turn Globe Blue when Raining
        ##########################################################

- alias: Lights - Turn Globe Blue when Raining
  id: 'lights_turn_globe_blue_when_raining'

  triggers:
    - trigger: state
      entity_id: weather.REDACTED
      to: 'rainy'
      for:
        hours: 0
        minutes: 1
        seconds: 0
    - trigger: state
      entity_id: weather.REDACTED
      to: 'lightning-rainy'
      for:
        hours: 0
        minutes: 1
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: light.globe
      state: 'on'
    - condition: state
      entity_id: input_boolean.disable_interior_light_automations
      state: 'off'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.globe
      data:
        color_name: blue
        brightness_pct: 100
        transition: 30

        ##########################################################
        ## Reset Globe Color when Not Raining
        ##########################################################

- alias: Lights - Reset Globe Color when Not Raining
  id: 'lights_reset_globe_color_when_not_raining'

  triggers:
    - trigger: state
      entity_id: weather.REDACTED
      from: 'rainy'
    - trigger: state
      entity_id: weather.REDACTED
      from: 'lightning-rainy'

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: light.globe
      state: 'on'
    - condition: state
      entity_id: input_boolean.disable_interior_light_automations
      state: 'off'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.globe
      data:
        brightness_pct: 65
        color_temp: 366
        transition: 30

        ##########################################################
        ## Set Globe Blue when On and Raining
        ##########################################################

- alias: Lights - Set Globe Blue when On and Raining
  id: 'lights_set_globe_blue_when_on_and_raining'

  triggers:
    - trigger: state
      entity_id: light.globe
      from: 'off'
      to: 'on'
      for:
        hours: 0
        minutes: 1
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: alarm_control_panel.alarm
      state: 'disarmed'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: weather.REDACTED
        state: 'rainy'
      - condition: state
        entity_id: weather.REDACTED
        state: 'lightning-rainy'
    - condition: state
      entity_id: input_boolean.disable_interior_light_automations
      state: 'off'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.globe
      data:
        color_name: blue
        brightness_pct: 100
        transition: 15