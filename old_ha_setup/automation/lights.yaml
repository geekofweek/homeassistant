#################################################################
## Lighting Automations
#################################################################

#################################################################
## Exterior Lights
#################################################################

        ##########################################################
        ## Turn On Front Porch & Garage at Sunset
        ##########################################################

- alias: Lights - Turn On Front Porch and Garage at Sunset
  id: 'lights_turn_on_front_porch_garage_at_sunset'

  triggers:
    - trigger: sun
      event: 'sunset'
      offset: '-00:15:00'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_exterior_light_automations
      state: 'off'
    - condition: state
      entity_id: input_select.exterior_holiday_lighting
      state: 'None'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.front_porch
          - light.garage
      data:
        transition: 900
        brightness_pct: 50
        color_temp_kelvin: 2700

        ##########################################################
        ## Dim Front Porch & Garage at Midnight
        ##########################################################

- alias: Lights - Dim Front Porch and Garage at Midnight
  id: 'lights_dim_front_porch_and_garage_at_midnight'

  triggers:
   - trigger: time
     at: '23:45:00'

  conditions:
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'
    - condition: state
      entity_id: input_boolean.disable_exterior_light_automations
      state: 'off'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.front_porch
          - light.garage
      data:
        transition: 900
        brightness_pct: 15
    - delay: '00:16:00'
    - action: light.turn_on
      target:
        entity_id:
          - light.front_porch
          - light.garage
      data:
        brightness_pct: 15

        ##########################################################
        ## Turn On Patio Lights at Sunset
        ##########################################################

- alias: Lights - Turn On Patio Lights at Sunset
  id: 'lights_turn_on_patio_lights_at_sunset'

  triggers:
    - trigger: sun
      event: 'sunset'
      offset: '-00:15:00'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_exterior_light_automations
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.patio_lights
      data:
        transition: 900
        brightness_pct: 5

        ##########################################################
        ## Turn Off Patio Lights at Night Weekdays
        ##########################################################

- alias: Lights - Turn Off Patio Lights at Night Weekdays
  id: 'lights_turn_off_patio_lights_at_night_weekdays'

  triggers:
   - trigger: time
     at: '21:00:00'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_exterior_light_automations
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.patio_party_mode
      state: 'off'
    - condition: time
      weekday:
        - sun
        - mon
        - tue
        - wed
        - thu

  actions:
    - action: light.turn_off
      data: {}
      target:
        entity_id:
          - light.patio_lights

        ##########################################################
        ## Turn Off Patio Lights at Night Weekends
        ##########################################################

- alias: Lights - Turn Off Patio Lights at Night Weekends
  id: 'lights_turn_off_patio_lights_at_night_weekends'

  triggers:
   - trigger: time
     at: '23:59:00'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_exterior_light_automations
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.patio_party_mode
      state: 'off'
    - condition: time
      weekday:
        - fri
        - sat

  actions:
    - action: light.turn_off
      data: {}
      target:
        entity_id:
          - light.patio_lights

        ##########################################################
        ## Turn Off Exterior Lights at Sunrise
        ##########################################################

- alias: Lights - Turn Off Exterior Lights at Sunrise
  id: 'lights_turn_off_exterior_lights_at_sunrise'

  triggers:
    - trigger: sun
      event: 'sunrise'
      offset: '+00:15:00'

  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.front_porch
          - light.garage
          - light.patio_lights
      data:
        transition: 900

