          state: 'on'
        - condition: state
          entity_id: input_boolean.patio_party_mode
          state: 'on'

  actions:
    - action: switch.turn_off
      data: {}
      target:
        entity_id:
          - switch.primary_bathroom_shower_exhaust_fan
          - switch.primary_bathroom_toilet_exhaust_fan
    - action: fan.turn_off
      data: {}
      target:
        entity_id:
          - fan.USER2s_office_ceiling_fan
    - action: media_player.media_stop
      data: {}
      target:
        entity_id:
          - media_player.bathroom_sonos
          - media_player.bedroom_sonos
    - action: light.turn_off
      data: {}
      target:
        entity_id:
          - light.bedroom_hallway_main_lights
          - light.primary_bedroom_lights
          - light.primary_bathroom_lights
          - light.primary_bedroom_closet
          - light.USER2_s_office_lights
    - action: climate.set_preset_mode
      data:
        entity_id: 
          - climate.main_floor
        preset_mode: 'sleep'

        ##########################################################
        ## Bedtime USER2 Away
        ##########################################################

- alias: Bedtime - Bedtime USER2 Away
  id: 'bedtime_USER2_away'

  triggers:
    - trigger: state
      entity_id: input_boolean.bedtime
      to: 'on'
      for:
        hours: 0
        minutes: 4
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: not
      conditions:
        - condition: state
          entity_id: person.USER2
          state: 'home'

  actions:
    - action: fan.turn_on
      data: {}
      target:
        entity_id:
          - fan.primary_bedroom_ceiling_fan
    - delay: '00:00:05'
    - action: fan.set_percentage
      data:
        percentage: 75
      target:
        entity_id: 
          - fan.primary_bedroom_ceiling_fan

        ##########################################################
        ## Bedtime Guest Mode Thermostat
        ##########################################################

- alias: Bedtime - Bedtime Guest Mode Thermostat
  id: 'bedtime_guest_mode_thermostat'

  triggers:
    - trigger: state
      entity_id: input_boolean.bedtime
      to: 'on'
      for:
        hours: 0
        minutes: 7
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: or
      conditions:
        - condition: state
          entity_id: input_boolean.guest_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.guest_bedroom_door_sensor
          state: 'off'

  actions:
    - action: climate.set_preset_mode
      data:
        entity_id: 
          - climate.upstairs
        preset_mode: 'Guest'

        ##########################################################
        ## Bedtime Guest Mode Off
        ##########################################################

- alias: Bedtime - Bedtime Guest Mode Off
  id: 'bedtime_guest_mode_off'

  triggers:
    - trigger: state
      entity_id: input_boolean.bedtime
      to: 'on'
      for:
        hours: 0
        minutes: 6
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'off'

  actions:
    - action: light.turn_off
      data: {}
      target:
        entity_id:
          - light.guest_bedroom_lights
          - light.guest_bathroom_lights
    - action: fan.turn_off
      data: {}
      target:
        entity_id:
          - fan.guest_bedroom_ceiling_fan
    - action: media_player.turn_off
      data: {}
      target:
        entity_id:
          - media_player.guest_bedroom_apple_tv
    - action: media_player.media_stop
      data: {}
      target:
        entity_id:
          - media_player.guest_bedroom_tv_sonos

        ##########################################################
        ## Turn AP LEDs When Bedtime Off
        ##########################################################

- alias: Bedtime - Turn AP LEDs On When Bedtime Off
  id: 'bedtime_turn_ap_leds_on_when_bedtime_off'

  triggers:
    - trigger: state
      entity_id: input_boolean.bedtime
      to: 'off'
      for:
        hours: 0
        minutes: 10
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'

  actions:
    - action: switch.turn_on
      data: {}
      target:
        entity_id:
          - switch.media_room_ap_led
          - switch.second_floor_ap_led
          - switch.four_season_room_ap_led

#################################################################
## Helpers
#################################################################

        ##########################################################
        ## Turn on Primary Bedtime if USER1 Not Home
        ##########################################################

- alias: Bedtime - Turn on Primary Bedtime if USER1 Not Home
  id: 'bedtime_primary_if_USER1_not_home'

  triggers:
    - trigger: state
      entity_id: input_boolean.USER2_bedtime
      to: 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 30

  conditions:
    - condition: state
      entity_id: person.USER2
      state: 'home'
    - condition: state
      entity_id: input_boolean.bedtime
      state: 'off'
    - condition: not
      conditions:
        - condition: state
          entity_id: person.USER1
          state: 'home'

  actions:
    - action: homeassistant.turn_on
      data: {}
      target:
        entity_id:
          - input_boolean.bedtime

        ##########################################################
        ## Turn off Bedtime when Bedroom Door Opens
        ##########################################################

- alias: Bedtime - Turn off Bedtime when Bedroom Door Opens
  id: 'bedtime_turn_off_bedtime_when_bedroom_door_opens'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bedroom_door_sensor
      to: 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 0
    - trigger: state
      entity_id: binary_sensor.primary_bedroom_door_sensor
      to: 'on'
      for:
        hours: 0
        minutes: 10
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: or
      conditions:
        - condition: state
          entity_id: input_boolean.bedtime
          state: 'on'
        - condition: state
          entity_id: input_boolean.USER2_bedtime
          state: 'on'
    - condition: time
      after: '05:00:00'
      before: '19:00:00'

  actions:
    - action: homeassistant.turn_off
      data: {}
      target:
        entity_id:
          - input_boolean.bedtime
          - input_boolean.USER2_bedtime

        ##########################################################
        ## Turn off Bedtime When Bedroom Hallway Motion Detected
        ##########################################################

- alias: Bedtime - Turn off Bedtime When Bedroom Hallway Motion Detected
  id: 'bedtime_turn_off_bedtime_when_bedroom_hallway_motion_detected'

  triggers:
    - trigger: state
      entity_id: binary_sensor.primary_bedroom_hallway_motion_sensor_motion_detection
      to: 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: or
      conditions:
        - condition: state
          entity_id: input_boolean.bedtime
          state: 'on'
        - condition: state
          entity_id: input_boolean.USER2_bedtime
          state: 'on'
    - condition: time
      after: '06:00:00'
      before: '19:00:00'
    - condition: state
      entity_id: binary_sensor.main_floor_cleaning
      state: 'off'

  actions:
    - action: homeassistant.turn_off
      data: {}
      target:
        entity_id:
          - input_boolean.bedtime
          - input_boolean.USER2_bedtime