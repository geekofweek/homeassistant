      ## Core One MMU 3D Print Complete App
      ##########################################################

- alias: LED Clock - Core One MMU 3D Print Complete App
  id: 'led_clock_core_one_mmu_3d_print_complete_app'

  triggers:
    - trigger: state
      entity_id: sensor.prusa_core_one_mmu
      from: 'printing'
      to: 'finished'
    - trigger: state
      entity_id: sensor.prusa_core_one_mmu
      from: 'printing'
      to: 'stopped'

  actions:
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/core_one_mmu_progress
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/core_one_mmu_time_remaining
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/notify
        payload: >-
          { 
          "icon": "3d_print_complete",
          "pushIcon": 0,
          "rainbow": true,
          "duration": 60,
          "text": "MMU: Finished"
          }
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/core_one_mmu_progress
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/core_one_mmu_time_remaining
    - action: mqtt.publish
      data:
        topic: media_room_clock/notify
