#################################################################
## LED Clock Automations
#################################################################

  ##########################################################
  ## Universal Device Control
  ##########################################################

        ##########################################################
        ## Bedtime 
        ##########################################################

- alias: LED Clock - Bedtime
  id: 'led_clock_bedtime'

  triggers:
    - trigger: state
      entity_id: input_boolean.bedtime
      to: 'on'
      for:
        hours: 0
        minutes: 6
        seconds: 0

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'

  actions:
    - action: light.turn_off
      entity_id:
        - light.USER1_s_office_led_clock_matrix
        - light.media_room_led_clock_matrix
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/music_song
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/music_album
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/music_song
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/music_album
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/youtube
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/youtube
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/party_time
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/party_time
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/tv_state
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/temp
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/temp

        ##########################################################
        ## Household Away Mode LED Clock
        ##########################################################

- alias: LED Clock - Household Away Mode
  id: 'led_clock_household_away_mode'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'home'
      to: 'not_home'
      for:
        hours: 0
        minutes: 6
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_location_automations
      state: 'off'

  actions:
    - action: light.turn_off
      entity_id:
        - light.USER1_s_office_led_clock_matrix
        - light.media_room_led_clock_matrix
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/music_song
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/music_album
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/music_song
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/music_album
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/youtube
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/youtube
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/party_time
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/party_time
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/tv_state

  ##########################################################
  ## Universal Apps
  ##########################################################

      ##########################################################
      ## Weather App
      ##########################################################

- alias: LED Clock - Weather App
  id: 'led_clock_weather_app'

  triggers:
    - trigger: time_pattern
      minutes: '/30'
    - trigger: state
      entity_id: weather.REDACTED

  actions:
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/weather
        payload: >-
          { 
          "icon": "weather_{{ states("sensor.weather_condition_lcd_clock_icon") |regex_replace(find='-', replace='_', ignorecase=False) }}",
          "pushIcon": 0,
          "text": "{{ states("sensor.weather_condition_human_readable") }}"
          }
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/weather
        payload: >-
          { 
          "icon": "weather_{{ states("sensor.weather_condition_lcd_clock_icon") |regex_replace(find='-', replace='_', ignorecase=False) }}",
          "pushIcon": 0,
          "text": "{{ states("sensor.weather_condition_human_readable") }}"
          }

