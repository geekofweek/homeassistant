- alias: LED Clock - Main Floor Vacuum is Cleanning
  id: 'led_clock_main_floor_vacuum_is_cleaning'

  triggers:
    - trigger: state
      entity_id: vacuum.main_floor
      to: 'cleaning'
    - trigger: state
      entity_id: sensor.main_floor_current_room

  conditions:
    - condition: state
      entity_id: vacuum.main_floor
      state: 'cleaning'
    - condition: state
      entity_id: binary_sensor.main_floor_cleaning
      state: 'on'

  actions:
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/main_floor_vacuum
        payload: >-
          { 
          "icon": "vacuum",
          "pushIcon": 0,
          "repeat": 3,
          "scrollSpeed": 70,
          "color": [0,128,0],
          "text": "Cleaning {{ states("sensor.main_floor_current_room") }}"
          }
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/main_floor_vacuum
        payload: >-
          { 
          "icon": "vacuum",
          "pushIcon": 0,
          "repeat": 3,
          "scrollSpeed": 70,
          "color": [0,128,0],
          "text": "Cleaning {{ states("sensor.main_floor_current_room") }}"
