  ##########################################################

      ##########################################################
      ## Turn On USER1 Office LED Clock when Motion Detected
      ##########################################################

- alias: LED Clock - Turn On USER1's Office when Motion Detected
  id: 'led_clock_turn_on_USER1_office_when_motion_detected'

  triggers:
    - trigger: state
      entity_id: binary_sensor.USER1_s_office_occupancy
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_motion_automations
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: light.USER1_s_office_led_clock_matrix
      state: 'off'
    - condition: state
      entity_id: person.USER1
      state: 'home'

  actions:
    - action: light.turn_on
      entity_id:
        - light.USER1_s_office_led_clock_matrix

      ##########################################################
      ## Turn Off USER1 Office LED Clock when No Motion Detected
      ##########################################################

- alias: LED Clock - Turn Off USER1's Office when No Motion Detected
  id: 'led_clock_turn_off_USER1_office_when_no_motion_detected'

  triggers:
    - trigger: state
      entity_id: binary_sensor.USER1_s_office_occupancy
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 20
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_motion_automations
      state: 'off'
    - condition: state
      entity_id: light.USER1_s_office_led_clock_matrix
      state: 'on'

  actions:
    - action: light.turn_off
      entity_id:
        - light.USER1_s_office_led_clock_matrix

