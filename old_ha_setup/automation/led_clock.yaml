      ##########################################################
      ## Core One MMU Print Progress App
      ##########################################################

- alias: LED Clock - Core One MMU Print Progress App
  id: 'led_clock_core_one_mmu_print_progress_app'

  triggers:
    - trigger: state
      entity_id: sensor.prusa_core_one_mmu_progress
  
  conditions:
    - condition: state
      entity_id: sensor.prusa_core_one_mmu
      state: 'printing'

  actions:
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/core_one_mmu_progress
        payload: >-
          { 
          "icon": "3d_print",
          "pushIcon": 0,
          "color": [255,98,0],
          "repeat": 3,
          "text": "MMU: {{ states("sensor.prusa_core_one_mmu_progress") |round }}%"
          }
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/core_one_mmu_progress
        payload: >-
          { 
          "icon": "3d_print",
          "pushIcon": 0,
          "color": [255,98,0],
          "repeat": 3,
          "text": "MMU: {{ states("sensor.prusa_core_one_mmu_progress") |round }}%"
          }

      ##########################################################
      ## Core One MMU 3D Print Time Remaining App
      ##########################################################

- alias: LED Clock - Core One MMU Print Time Remaining App
  id: 'led_clock_core_one_mmu_print_time_remaining_app'

  triggers:
    - trigger: state
      entity_id: sensor.prusa_core_one_mmu_progress
  
  conditions:
    - condition: state
      entity_id: sensor.prusa_core_one_mmu
      state: 'printing'

  actions:
    - action: mqtt.publish
      data:
        topic: USER1_office_clock/custom/core_one_mmu_time_remaining
        payload: >-
          { 
          "icon": "clock",
          "pushIcon": 2,
          "color": [255,98,0],
          "repeat": 3,
          "text": "MMU: {{ relative_time(now() - timedelta( seconds = as_timestamp(states('sensor.prusa_core_one_mmu_print_finish')) - as_timestamp(now()))) }}"
          }
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/core_one_mmu_time_remaining
        payload: >-
          { 
          "icon": "clock",
          "pushIcon": 2,
          "color": [255,98,0],
          "repeat": 3,
          "text": "MMU: {{ relative_time(now() - timedelta( seconds = as_timestamp(states('sensor.prusa_core_one_mmu_print_finish')) - as_timestamp(now()))) }}"
          }

