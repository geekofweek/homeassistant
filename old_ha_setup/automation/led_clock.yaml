          "icon": "{{ states("sensor.outdoor_temp_range") }}",
          "pushIcon": 0,
          "text": "{{ states("sensor.REDACTED_temperature") }}°F"
          }
    - action: mqtt.publish
      data:
        topic: media_room_clock/custom/temperature
        payload: >-
          { 
          "icon": "{{ states("sensor.outdoor_temp_range") }}",
          "pushIcon": 0,
          "text": "{{ states("sensor.REDACTED_temperature") }}°F"
          }

