#################################################################
## Garage Automations
#################################################################

        ##########################################################
        ## Household Away Mode Close Garage
        ##########################################################

- alias: Garage - Household Away Mode Close Garage
  id: 'garage_household_away_mode_close_garage'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'home'
      to: 'not_home'
      for:
        hours: 0
        minutes: 2
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_garage_automations
      state: 'off'
    - condition: state
      entity_id: cover.garage_door
      state: 'open'
    - condition: state
      entity_id: binary_sensor.garage_door_motor
      state: 'off'

  actions:
    - action: cover.close_cover
      data: {}
      target:
        entity_id: 
          - cover.garage_door

