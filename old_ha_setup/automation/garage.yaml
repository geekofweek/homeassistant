        ##########################################################
        ## After USER1 Home Close Garage Windy
        ########################################################

- alias: Garage - USER1 Home Close Garage Windy
  id: 'garage_USER1_home_close_garage_windy'

  triggers:
    - trigger: state
      entity_id: person.USER1
      from: 'not_home'
      to: 'home'
      for:
        hours: 0
        minutes: 5
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_garage_automations
      state: 'off'
    - condition: state
      entity_id: cover.garage_door
      state: 'open'
    - condition: state
      entity_id: binary_sensor.garage_door_motor
      state: 'off'
    - condition: or
      conditions:
      - condition: state
        entity_id: weather.REDACTED
        state: 'windy'
      - condition: numeric_state
        entity_id: weather.REDACTED
        attribute: wind_speed
        above: '13'

  actions:
    - action: cover.close_cover
      data: {}
      target:
        entity_id: 
          - cover.garage_door

