#################################################################
## Notifications
#################################################################

        #################################################################
        ## Garage Open iOS Notification
        #################################################################

- alias: Garage - Open iOS Notification
  id: 'garage_open_ios_notification'

  triggers:
    - trigger: state
      entity_id: cover.garage_door
      from: 'opening'
      to: 'open'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: Garage Door Open
        data:
          tag: garage-open
          entity_id: camera.garage
          actions:
            - action: "close_garage"
              title: "Close Garage Door"
              destructive: true
              activationMode: background

        #################################################################
        ## Garage Closed iOS Notification
        #################################################################

- alias: Garage - Closed iOS Notification
  id: 'garage_closed_ios_notification'

  triggers:
    - trigger: state
      entity_id: cover.garage_door
      from: 'closing'
      to: 'closed'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: Garage Door Closed
        data:
          tag: garage-closed
          entity_id: camera.garage
          actions:
            - action: "open_garage"
              title: "Open Garage Door"
              destructive: true
              activationMode: background

        #################################################################
        ## Garage Door Still Open iOS Notification
        #################################################################

- alias: Garage - Door Still Open iOS Notification
  id: 'garage_door_still_open_ios_notification'

  triggers:
    - trigger: state
      entity_id: cover.garage_door
      to: 'open'
      for:
        hours: 0
        minutes: 45
        seconds: 0
    - trigger: state
      entity_id: cover.garage_door
      to: 'closing'
      for:
        hours: 0
        minutes: 10
        seconds: 0
    - trigger: state
      entity_id: cover.garage_door
      to: 'opening'
      for:
        hours: 0
        minutes: 10
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: Garage Door is Still Open!
        data:
          tag: garage-still-open
          entity_id: camera.garage
          actions:
            - action: "close_garage"
              title: "Close Garage Door"
              destructive: true
              activationMode: background

