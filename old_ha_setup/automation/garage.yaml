      entity_id: person.USER1
      from: 'not_home'
      to: 'home'
      for:
        hours: 0
        minutes: 0
        seconds: 2

  conditions:
    - condition: state
      entity_id: binary_sensor.garage_door_motor
      state: 'off'
    - condition: state
      entity_id: input_boolean.disable_garage_automations
      state: 'off'
