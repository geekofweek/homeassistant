    - trigger: state
      entity_id: lock.patio_door
      to: 'unknown'
      for:
        hours: 0
        minutes: 5
        seconds: 0
    - trigger: state
      entity_id: lock.kitchen_door
      to: 'unknown'
      for:
        hours: 0
        minutes: 5
        seconds: 0
    - trigger: state
      entity_id: lock.garage_door
      to: 'unknown'
      for:
        hours: 0
        minutes: 10
        seconds: 0
    - trigger: state
      entity_id: lock.patio_door
      to: 'unknown'
      for:
        hours: 0
        minutes: 10
