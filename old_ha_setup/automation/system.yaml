#################################################################
## System
#################################################################

        ##########################################################
        ## Reset Overrides at 7a
        ##########################################################

- alias: System - Reset Overrides at 7a
  id: 'system_reset_overrides_at_7a'

  triggers:
   - trigger: time
     at: '07:00:00'

  conditions:
    - condition: state
      entity_id: input_boolean.out_of_town_mode
      state: 'off'

  actions:
    - action: homeassistant.turn_off
      data: {}
      target:
        entity_id:
          - input_boolean.disable_camera_automations
          - input_boolean.disable_climate_automations
          - input_boolean.disable_door_automations
          - input_boolean.disable_door_lock_automations
          - input_boolean.disable_exhaust_fan_automations
          - input_boolean.disable_exterior_light_automations
          - input_boolean.disable_fan_automations
          - input_boolean.disable_garage_automations
          - input_boolean.disable_interior_light_automations
          - input_boolean.disable_location_automations
          - input_boolean.disable_media_automations
          - input_boolean.disable_motion_automations
          - input_boolean.disable_notifications
          - input_boolean.disable_vacuum_automations
          - input_boolean.disable_water_works_automations
          - input_boolean.patio_party_mode
    - action: switch.turn_on
      target:
        entity_id:
          - switch.ad_block

        #################################################################
        ## Clear Erroneous Failed Login Notifications
        #################################################################

- alias: System - Clear Erroneous Failed Login Notifications
  id: 'system_clear_erroneous_failed_login_notifications'

  triggers:
    - trigger: state
      entity_id: persistent_notification.http_login
      to: 'notifying'

  actions:
    - delay: "00:00:01"
    - action: persistent_notification.dismiss
      data:
        notification_id: http-login

