- alias: 3D-Printer - Prusa Core One MMU Print Error
  id: '3d_printer_prusa_core_one_mmu_print_error'

  triggers:
    - trigger: numeric_state
      entity_id: sensor.prusa_core_one_mmu_nozzle_temperature
      below: 165
      for:
        hours: 0
        minutes: 1
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'
    - condition: state
      entity_id: sensor.prusa_core_one_mmu
      state: 'printing'

  actions:
    - action: notify.USER1_devices
      data:
        message: Print Error (MMU)
