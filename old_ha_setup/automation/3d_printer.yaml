#################################################################
## 3D Printer Automations
#################################################################

#################################################################
## Prusa Core One L
#################################################################

        ##########################################################
        ## Prusa Core One L 3D Print Finished
        ##########################################################

- alias: 3D-Printer - Prusa Core One L Print Finished
  id: '3d_printer_prusa_core_one_l_print_finished'

  triggers:
    - trigger: state
      entity_id: sensor.prusa_core_one_l
      from: 'printing'
      to: 'finished'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.prusa_core_one_l
        state: 'printing'

  actions:
    - action: notify.USER1_devices
      data:
        message: 3D Print Complete (Core One L)
        data:
          tag: prusa_core_one_l
          entity_id: camera.prusa_core_one_l

        ##########################################################
        ## Prusa Core One L Print Stopped
        ##########################################################

