#################################################################
## Laundry Automations
#################################################################

#################################################################
## Notifications
#################################################################

        ##########################################################
        ## Washing Machine Done - USER1 iOS Notification
        ##########################################################

- alias: Laundry - Washing Machine Done USER1 iOS Notification
  id: 'laundry_washing_machine_done_USER1_ios_notification'

  triggers:
    - trigger: state
      entity_id: sensor.washer_current_status
      to: 'end'
      for:
        hours: 0
        minutes: 0
        seconds: 1

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: person.USER1
      state: 'home'
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: Washing Machine Finished
        data:
          tag: washer

