        ##########################################################
        ## Washing Machine Done - Audio Notification
        ##########################################################

- alias: Laundry - Washing Machine Done Audio Notification
  id: 'laundry_washing_machine_done_audio_notification'

  triggers:
    - trigger: state
      entity_id: sensor.washer_current_status
      to: 'end'
      for:
        hours: 0
        minutes: 0
        seconds: 1

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'
    - condition: time
      after: '09:00:00'
      before: '20:00:00'

  actions:
    - action: media_player.play_media
      target:
        entity_id: 
          - media_player.living_room_sonos
          - media_player.kitchen_sonos
          - media_player.bedroom_sonos
          - media_player.bathroom_sonos
          - media_player.four_season_room_sonos
          - media_player.study_sonos
          - media_player.game_room_sonos
          - media_player.media_room_sonos
          - media_player.roam_sonos

      data:
        announce: true
        media_content_id: >
          media-source://tts/cloud?message="Washing Machine Has Finished"
        media_content_type: "music"
        extra:
          volume: 30

