#################################################################
## Camera Automations
#################################################################

        ##########################################################
        ## Doorbell Chime Sonos
        ##########################################################

- alias: Camera - Doorbell Chime Sonos
  id: 'camera_doorbell_chime_sonos'

  triggers:
    - trigger: state
      entity_id: binary_sensor.front_door_camera_doorbell
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'
      
  actions:
    - action: media_player.play_media
      target:
        entity_id: 
          - media_player.bedroom_sonos
          - media_player.bathroom_sonos
          - media_player.kitchen_sonos
          - media_player.laundry_room_sonos
          - media_player.game_room_sonos
          - media_player.media_room_sonos
          - media_player.USER1_s_office_sonos
          - media_player.workshop_sonos
          - media_player.USER2_s_office_sonos
          - media_player.four_season_room_sonos
          - media_player.roam_sonos
      data:
        announce: true
        media_content_id: media-source://media_source/local/doorbell/doorbell.mp3
        media_content_type: "music"
        extra:
          volume: 30

        ##########################################################
        ## Doorbell Disable Mechanical Chime when Cold
        ##########################################################

- alias: Camera - Doorbell Disable Mechanical Chime when Cold
  id: 'camera_doorbell_disable_mechanical_chime_when_cold'

  triggers:
    - trigger: numeric_state
      entity_id: sensor.REDACTED_temperature
      below: 32
      for:
        hours: 1
        minutes: 0
        seconds: 0

  conditions:
    - condition: state
      entity_id: select.front_door_camera_chime_type
      state: "mechanical"

  actions:
    - action: select.select_option
      data:
        entity_id: select.front_door_camera_chime_type
        option: "none"

        ##########################################################
        ## Doorbell Enable Mechanical Chime when Warm
        ##########################################################

- alias: Camera - Doorbell Enable Mechanical Chime when Warm
  id: 'camera_doorbell_enable_mechanical_chime_when_warm'

  triggers:
    - trigger: numeric_state
      entity_id: sensor.REDACTED_temperature
      above: 32
      for:
        hours: 2
        minutes: 0
        seconds: 0

  conditions:
    - condition: state
      entity_id: select.front_door_camera_chime_type
      state: "none"

  actions:
    - action: select.select_option
      data:
        entity_id: select.front_door_camera_chime_type
        option: "mechanical"

        ##########################################################
        ## Package Camera On
        ##########################################################

- alias: Camera - Package Camera On
  id: 'camera_package_camera_on'

  triggers:
    - trigger: state
      entity_id: binary_sensor.front_door_camera_package_detected
      to: 'on'
    - trigger: state
      entity_id: binary_sensor.front_door_camera_doorbell
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.view_package_camera
      state: 'off'
    - condition: state
      entity_id: input_boolean.disable_camera_automations
      state: 'off'

  actions:
    - action: homeassistant.turn_on
      data: {}
      target:
        entity_id:
          - input_boolean.view_package_camera

        ##########################################################
        ## Package Camera Off
        ##########################################################

- alias: Camera - Package Camera Off
  id: 'camera_package_camera_off'

  triggers:
    - trigger: state
      entity_id: binary_sensor.front_door_sensor
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 1
        seconds: 0
    - trigger: state
      entity_id: cover.garage_door
      to: 'open'
      for:
        hours: 0
        minutes: 1
        seconds: 0

  conditions:
    - condition: or
      conditions:
      - condition: state
        entity_id: input_boolean.view_package_camera
        state: 'on'
      - condition: state
        entity_id: input_boolean.package_camera_notification
        state: 'on'
    - condition: state
      entity_id: input_boolean.disable_camera_automations
      state: 'off'

  actions:
    - action: homeassistant.turn_off
      data: {}
      target:
        entity_id:
          - input_boolean.view_package_camera
          - input_boolean.package_camera_notification

        ##########################################################
        ## Package Camera Off at Midnight
        ##########################################################

- alias: Camera - Package Camera Off at Midnight
  id: 'camera_package_camera_off_at_midnight'

  triggers:
   - trigger: time
     at: '23:59:00'

  conditions:
    - condition: or
      conditions:
      - condition: state
        entity_id: input_boolean.view_package_camera
        state: 'on'
      - condition: state
        entity_id: input_boolean.package_camera_notification
        state: 'on'
    - condition: state
      entity_id: input_boolean.disable_camera_automations
      state: 'off'

  actions:
    - action: homeassistant.turn_off
      data: {}
      target:
        entity_id:
          - input_boolean.view_package_camera
          - input_boolean.package_camera_notification

        ##########################################################
        ## Turn On Front Porch & Garage Lights when Motion or Doorbell
        ##########################################################

- alias: Camera - Turn On Front Porch and Garage Lights when Motion or Doorbell
  id: 'camera_turn_on_front_porch_and_garage_lights_when_motion_doorbell'

  triggers:
    - trigger: state
      entity_id: binary_sensor.driveway_camera_person_detected
      from: 'off'
      to: 'on'
    - trigger: state
      entity_id: binary_sensor.driveway_camera_vehicle_detected
      from: 'off'
      to: 'on'
    - trigger: state
      entity_id: binary_sensor.front_door_camera_person_detected
      from: 'off'
      to: 'on'
    - trigger: state
      entity_id: binary_sensor.front_door_camera_doorbell
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'
    - condition: state
      entity_id: input_boolean.disable_camera_automations
      state: 'off'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.front_porch
          - light.garage
      data:
        brightness_pct: 100
        transition: 2

        ##########################################################
        ## Reset Front Porch & Garage Lights Brightness After Motion or Doorbell
        ##########################################################

- alias: Camera - Reset Front Porch and Garage Lights Brightness After Motion or Doorbell
  id: 'camera_reset_front_porch_and_garage_lights_brightness_after_motion_doorbell'

  triggers:
    - trigger: state
      entity_id: binary_sensor.driveway_camera_person_detected
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 15
        seconds: 0
    - trigger: state
      entity_id: binary_sensor.driveway_camera_vehicle_detected
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 15
        seconds: 0
    - trigger: state
      entity_id: binary_sensor.front_door_camera_person_detected
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 15
        seconds: 0
    - trigger: state
      entity_id: binary_sensor.front_door_camera_doorbell
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 15
        seconds: 0

  conditions:
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'
    - condition: state
      entity_id: input_boolean.disable_camera_automations
      state: 'off'
    - condition: time
      after: '14:00:00'
      before: '23:44:00'
    - condition: state
      entity_id: input_select.exterior_holiday_lighting
      state: 'None'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.front_porch
          - light.garage
      data:
        brightness_pct: 50
        transition: 900

        ##########################################################
        ## Reset Front Porch & Garage Lights Brightness After Motion or Doorbell after Midnight
        ##########################################################

- alias: Camera - Reset Front Porch and Garage Lights Brightness After Motion or Doorbell after Midnight
  id: 'camera_reset_front_porch_and_garage_lights_brightness_after_motion_doorbell_after_midnight'

  triggers:
    - trigger: state
      entity_id: binary_sensor.driveway_camera_person_detected
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 15
        seconds: 0
    - trigger: state
      entity_id: binary_sensor.driveway_camera_vehicle_detected
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 15
        seconds: 0
    - trigger: state
      entity_id: binary_sensor.front_door_camera_person_detected
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 15
        seconds: 0
    - trigger: state
      entity_id: binary_sensor.front_door_camera_doorbell
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 15
        seconds: 0

  conditions:
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'
    - condition: state
      entity_id: input_boolean.disable_camera_automations
      state: 'off'
    - condition: time
      after: '00:00:00'
      before: '07:30:00'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.front_porch
          - light.garage
      data:
        brightness_pct: 15
        transition: 900

