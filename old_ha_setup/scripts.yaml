roborock_room_clean:
  sequence:
  - if:
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.roborock_clean_bathroom
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_bedroom
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_bedroom_hallway
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_closet
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_dining_room
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_foyer
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_hallway
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_hallway_bathroom
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_kitchen
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_laundry_room
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_living_room
        state: 'off'
      - condition: state
        entity_id: input_boolean.roborock_clean_study
        state: 'off'
    then:
    - action: vacuum.start
      metadata: {}
      data: {}
      target:
        entity_id: vacuum.main_floor
    else:
    - variables:
        room_configs:
        - name: bedroom hallway
          boolean: input_boolean.roborock_clean_bedroom_hallway
          id: 1
        - name: laundry room
          boolean: input_boolean.roborock_clean_laundry_room
          id: 2
        - name: hallway bathroom
          boolean: input_boolean.roborock_clean_hallway_bathroom
          id: 3
        - name: bedroom
          boolean: input_boolean.roborock_clean_bedroom
          id: 4
        - name: closet
          boolean: input_boolean.roborock_clean_closet
          id: 5
        - name: bathroom
          boolean: input_boolean.roborock_clean_bathroom
          id: 6
        - name: kitchen
          boolean: input_boolean.roborock_clean_kitchen
          id: 8
        - name: study
          boolean: input_boolean.roborock_clean_study
          id: 9
        - name: living room
          boolean: input_boolean.roborock_clean_living_room
          id: 10
        - name: foyer
          boolean: input_boolean.roborock_clean_foyer
          id: 11
        - name: hallway
          boolean: input_boolean.roborock_clean_hallway
          id: 12
        - name: dinning room
          boolean: input_boolean.roborock_clean_dining_room
          id: 13
    - variables:
        selected_rooms: "{% set ns = namespace(rooms=[]) %}\n{% for room in room_configs
          %}\n  {% if is_state(room.boolean, 'on') %}\n    {% set ns.rooms = ns.rooms
          + [room.id] %}\n  {% endif %}\n{% endfor %}\n{{ ns.rooms }}"
    - data:
        command: app_segment_clean
        params:
        - segments: '{{ selected_rooms }}'
      target:
        entity_id: vacuum.main_floor
      action: vacuum.send_command
    - wait_template: '  {{ is_state(''vacuum.main_floor'',''cleaning'') }}'
      continue_on_timeout: true
    - action: input_boolean.turn_off
      metadata: {}
      data: {}
      target:
        entity_id:
        - input_boolean.roborock_clean_bathroom
        - input_boolean.roborock_clean_bedroom
        - input_boolean.roborock_clean_bedroom_hallway
        - input_boolean.roborock_clean_closet
        - input_boolean.roborock_clean_dining_room
        - input_boolean.roborock_clean_foyer
        - input_boolean.roborock_clean_hallway
        - input_boolean.roborock_clean_hallway_bathroom
        - input_boolean.roborock_clean_kitchen
        - input_boolean.roborock_clean_laundry_room
        - input_boolean.roborock_clean_living_room
        - input_boolean.roborock_clean_study
        - input_boolean.main_floor_roborock_room_clean_view
  alias: Roborock Room Clean
  description: ''
  icon: mdi:vacuum
