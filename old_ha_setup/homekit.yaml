#################################################################
## HomeKit Accessory Mode
#################################################################

  - name: Front Door Camera
    mode: accessory
    port: 21068
    filter:
      include_entities:
        - camera.front_door
    entity_config:
        camera.front_door:
          video_codec: copy
          linked_motion_sensor: binary_sensor.front_door_camera_person_detected
          linked_doorbell_sensor: binary_sensor.front_door_camera_doorbell

  - name: Driveway Camera
    mode: accessory
    port: 21069
    filter:
      include_entities:
        - camera.driveway
    entity_config:
        camera.driveway:
          video_codec: copy
          linked_motion_sensor: binary_sensor.driveway_camera_object_detected

  - name: Patio Camera
    mode: accessory
    port: 21070
    filter:
      include_entities:
        - camera.patio
    entity_config:
        camera.backyard_gate:
          video_codec: copy

  - name: Backyard Camera
    mode: accessory
    port: 21071
    filter:
      include_entities:
        - camera.backyard
    entity_config:
        camera.backyard:
          video_codec: copy

  - name: Garage Camera
    mode: accessory
    port: 21072
    filter:
      include_entities:
        - camera.garage
    entity_config:
        camera.garage:
          video_codec: copy
          linked_motion_sensor: binary_sensor.garage_camera_object_detected

  - name: Side Yard Camera
    mode: accessory
    port: 21073
    filter:
      include_entities:
        - camera.side_yard
    entity_config:
        camera.front_yard:
          video_codec: copy

  - name: Garage Door Lock
    mode: accessory
    port: 21074
    filter:
      include_entities:
        - lock.garage_door
    entity_config:
      lock.front_door:
        linked_battery_sensor: sensor.garage_door_lock_battery_level

  - name: Patio Door Lock
    mode: accessory
    port: 21075
    filter:
      include_entities:
        - lock.patio_door
    entity_config:
      lock.back_door:
        linked_battery_sensor: sensor.patio_door_lock_battery_level

  - name: Kitchen Door Lock
    mode: accessory
    port: 21076
    filter:
      include_entities:
        - lock.kitchen_door
    entity_config:
      lock.basement_door:
        linked_battery_sensor: sensor.kitchen_door_lock_battery_level

  - name: Media Room TV
    mode: accessory
    port: 21077
    filter:
      include_entities:
        - remote.media_room

  - name: Alarm
    mode: accessory
    port: 21078
    filter:
      include_entities:
        - alarm_control_panel.alarm

  - name: Main Floor Thermostat
    mode: accessory
    port: 21079
    filter:
      include_entities:
        - climate.main_floor
  
  - name: Upstairs Thermostat
    mode: accessory
    port: 21080
    filter:
      include_entities:
        - climate.upstairs