#################################################################
## Templates
#################################################################

      ##########################################################
      ## Weather Template
      ##########################################################

  - weather:
    - unique_id: weather_REDACTED
      name: REDACTED, MO
      condition_template: "{{ states('sensor.weather_condition_REDACTED') }}"
      temperature_template: "{{ state_attr('weather.REDACTED_ecobee', 'temperature') }}"
      humidity_template: "{{ state_attr('weather.REDACTED_ecobee', 'humidity') }}"
      forecast_daily_template: "{{ state_attr('sensor.REDACTED_daily_forecast', 'forecast') }}"
      attribution_template: "{{ state_attr('weather.REDACTED_ecobee', 'attribution') }}"
      pressure_template: "{{ state_attr('weather.REDACTED_ecobee', 'pressure') }}"
      wind_speed_template: "{{ state_attr('weather.REDACTED_ecobee', 'wind_speed') }}"
      wind_bearing_template: "{{ state_attr('weather.REDACTED_ecobee', 'wind_bearing') }}"
      visibility_template: "{{ state_attr('weather.REDACTED_ecobee', 'visibility') }}"

      ##########################################################
      ## Navimow Mower Status
      ##########################################################

  - trigger:
      platform: event
      event_type: set_mower_state
    sensor:
      - name: "Mower Battery level"
        unique_id: "mower_battery_level"
        device_class: battery
        state_class: measurement
        unit_of_measurement: "%"
        state: "{{ trigger.event.data.battery_level }}"

      - name: "Mower: Status"
        unique_id: "mower_status"
        icon: "mdi:robot-mower"
        state: |
          {{
            {
              "is running": "Mowing",
              "isn't docked": "Mowing",
              "running": "Mowing",
              "is paused": "Paused",
              "is docked": "Parked",
              "isn't running": "Parked"
            }[trigger.event.data.status] | default('unknown')
          }}

      ##########################################################
      ## Fake Binary Sensors for UI Elements
      ##########################################################

  - binary_sensor:
      - name: "Constant: True"
        unique_id: constant_true
        state: "on"
      
      - name: "Constant: False"
        unique_id: constant_false
        state: "off"

       ##########################################################
       ## Water Flow
       ##########################################################

  - binary_sensor:
    - unique_id: water_flow_status
      name: "Water Flow Status"
      state: >-
        {{ states('sensor.water_meter_current') != "0" }}

       ##########################################################
       ## Sump Pump South
       ##########################################################

  - binary_sensor:
      - unique_id: sump_pump_south_status
        name: "Sump Pump South Status"
        state: >
          {{ states('sensor.sump_pump_south_power_monitor_power')|float > 0 }}

       ##########################################################
       ## Sump Pump North
       ##########################################################

  - binary_sensor:
      - unique_id: sump_pump_north_status
        name: "Sump Pump North Status"
        state: >
          {{ states('sensor.sump_pump_north_power_monitor_power')|float > 0 }}

      ##########################################################
      ## Main Floor Thermostat
      ##########################################################

  - sensor:
    - unique_id: thermostat_main_floor_climate_mode
      name: Main Floor Thermostat Climate Mode
      state: '{{ states.climate.main_floor.attributes.preset_mode }}'

      ##########################################################
      ## Upstairs Thermostat
      ##########################################################

  - sensor:
    - unique_id: thermostat_upstairs_climate_mode
      name: Upstairs Thermostat Climate Mode
      state: '{{ states.climate.upstairs.attributes.preset_mode }}'

      ##########################################################
      ## Outdoor Humidity
      ##########################################################

  - sensor:
    - unique_id: REDACTED_humidity
      name: REDACTED, MO Humidity
      device_class: humidity
      unit_of_measurement: '%'
      state: '{{ states.weather.REDACTED.attributes.humidity }}'

      ##########################################################
      ## Outdoor Temperature
      ##########################################################

  - sensor:
    - unique_id: REDACTED_temperature
      name: REDACTED, MO Temperature
      device_class: temperature
      unit_of_measurement: '°F'
      state: '{{ states.weather.REDACTED.attributes.temperature }}'

      ##########################################################
      ## Get Forecast at Timed Intervals
      ##########################################################

  - trigger:
      - platform: time_pattern
        minutes: "/15"
    action:
      - service: weather.get_forecasts
        target:
          entity_id: weather.REDACTED_ecobee
        data:
          type: daily
        response_variable: daily
    sensor:
      - name: REDACTED, MO Daily Forecast
        unique_id: REDACTED_daily_forecast
        state: "{{ now().isoformat() }}"
        attributes:
          forecast: "{{ daily['weather.REDACTED_ecobee'].forecast }}"
      - name: REDACTED, MO Forecasted Condition
        unique_id: REDACTED_forecasted_condition
        state: "{{ daily['weather.REDACTED_ecobee'].forecast[0].condition }}"
      - name: REDACTED, MO Forecasted Temperature (High)
        unique_id: REDACTED_forecasted_temperature_high
        state: "{{ daily['weather.REDACTED_ecobee'].forecast[0].temperature }}"
        device_class: temperature
        unit_of_measurement: '°F'
      - name: REDACTED, MO Forecasted Temperature (Low)
        unique_id: REDACTED_forecasted_temperature_low
        state: "{{ daily['weather.REDACTED_ecobee'].forecast[0].templow }}"
        device_class: temperature
        unit_of_measurement: '°F'

      ##########################################################
      ## Outdoor Temperature Ranges
      ##########################################################

  - sensor:
    - unique_id: outdoor_temp_range
      name: Outdoor Temp Range
      state: >
        {% if states('sensor.REDACTED_temperature') | int >= 90 %}
          temp-hot
        {% elif states('sensor.REDACTED_temperature') | int >= 82 %}
          temp-warmer
        {% elif states('sensor.REDACTED_temperature') | int >= 76 %}
          temp-warm
        {% elif states('sensor.REDACTED_temperature') | int >= 60 %}
          temp-norm
        {% elif states('sensor.REDACTED_temperature') | int >= 45 %}
          temp-cool
        {% elif states('sensor.REDACTED_temperature') | int >= 33 %}
          temp-cooler
        {% elif states('sensor.REDACTED_temperature') | int <= 32 %}
          temp-cold
        {% else %}
          temp-norm
        {% endif %}

      ##########################################################
      ## Weather Condition Night Fix
      ##########################################################

  - sensor:
    - unique_id: weather_condition_REDACTED
      name: Weather Condition REDACTED, MO
      state: >
        {% if is_state('weather.REDACTED_ecobee', 'sunny') and is_state('sun.sun', 'above_horizon') %}
          sunny
        {% elif is_state('weather.REDACTED_ecobee', 'sunny') and is_state('sun.sun', 'below_horizon') %}
          clear-night
        {% else %}
          {{ states("weather.REDACTED_ecobee") }}
        {% endif %}

      ##########################################################
      ## Weather Condition LCD Clock Icons
      ##########################################################

  - sensor:
    - unique_id: weather_condition_lcd_clock_icon
      name: Weather Condition LCD Clock Icon
      state: >
        {% if is_state('weather.REDACTED_ecobee', 'sunny') and is_state('sun.sun', 'above_horizon') %}
          sunny
        {% elif is_state('weather.REDACTED_ecobee', 'sunny') and is_state('sun.sun', 'below_horizon') %}
          clear_night
        {% elif is_state('weather.REDACTED_ecobee', 'partlycloudy') and is_state('sun.sun', 'above_horizon') %}
          partlycloudy_day
        {% elif is_state('weather.REDACTED_ecobee', 'partlycloudy') and is_state('sun.sun', 'below_horizon') %}
          partlycloudy_night
        {% elif is_state('weather.REDACTED_ecobee', 'cloudy') %}
          cloudy
        {% elif is_state('weather.REDACTED_ecobee', 'fog') %}
          fog
        {% elif is_state('weather.REDACTED_ecobee', 'lightning') %}
          lightning
        {% elif is_state('weather.REDACTED_ecobee', 'lightning-rainy') %}
          lightning_rainy
        {% elif is_state('weather.REDACTED_ecobee', 'pouring') %}
          rainy
        {% elif is_state('weather.REDACTED_ecobee', 'rainy') %}
          rainy
        {% elif is_state('weather.REDACTED_ecobee', 'snowy') %}
          snowy
        {% elif is_state('weather.REDACTED_ecobee', 'snowy-rainy') %}
          snowy_rainy
        {% elif is_state('weather.REDACTED_ecobee', 'windy') %}
          windy
        {% elif is_state('weather.REDACTED_ecobee', 'windy-variant') %}
          windy
        {% elif is_state('weather.REDACTED_ecobee', 'hail') %}
          hail
        {% elif is_state('weather.REDACTED_ecobee', 'hazy') %}
          hazy
        {% elif is_state('weather.REDACTED_ecobee', 'Hazy') %}
          hazy
        {% else %}
          {{ states("sensor.weather_condition_REDACTED") }}
        {% endif %}

      ##########################################################
      ## Weather Condition Human Readable
      ##########################################################

  - sensor:
    - unique_id: weather_condition_human_readable
      name: Weather Condition Human Readable
      state: >
        {% if is_state('weather.REDACTED_ecobee', 'sunny') and is_state('sun.sun', 'above_horizon') %}
          Sunny
        {% elif is_state('weather.REDACTED_ecobee', 'sunny') and is_state('sun.sun', 'below_horizon') %}
          Clear Night
        {% elif is_state('weather.REDACTED_ecobee', 'partlycloudy') and is_state('sun.sun', 'above_horizon') %}
          Partly Cloudy
        {% elif is_state('weather.REDACTED_ecobee', 'partlycloudy') and is_state('sun.sun', 'below_horizon') %}
          Partly Cloudy
        {% elif is_state('weather.REDACTED_ecobee', 'cloudy') %}
          Cloudy
        {% elif is_state('weather.REDACTED_ecobee', 'fog') %}
          Fog
        {% elif is_state('weather.REDACTED_ecobee', 'lightning') %}
          Lightning
        {% elif is_state('weather.REDACTED_ecobee', 'lightning-rainy') %}
          Thunderstorm
        {% elif is_state('weather.REDACTED_ecobee', 'pouring') %}
          Rain
        {% elif is_state('weather.REDACTED_ecobee', 'rainy') %}
          Rain
        {% elif is_state('weather.REDACTED_ecobee', 'snowy') %}
          Snow
        {% elif is_state('weather.REDACTED_ecobee', 'snowy-rainy') %}
          Sleet
        {% elif is_state('weather.REDACTED_ecobee', 'windy') %}
          Windy
        {% elif is_state('weather.REDACTED_ecobee', 'windy-variant') %}
          Windy
        {% elif is_state('weather.REDACTED_ecobee', 'hail') %}
          Hail
        {% elif is_state('weather.REDACTED_ecobee', 'hazy') %}
          Hazy
        {% else %}
          {{ states("sensor.weather_condition_REDACTED") }}
        {% endif %}

#################################################################
## Shower Sensors
#################################################################

  - binary_sensor:
      - name: "Primary Bathroom Shower On"
        unique_id: primary_bathroom_shower_on
        state: >-
              {{ states('sensor.primary_bathroom_humidity_derivative') | float(0) > 0.4 and states('binary_sensor.primary_bathroom_door_sensor') == 'off' and states('binary_sensor.water_flow_status') == 'on' }}

  - binary_sensor:
      - name: "Guest Bathroom Shower On"
        unique_id: guest_bathroom_shower_on
        state: >-
              {{ states('sensor.guest_bathroom_humidity_derivative') | float(0) > 1 and states('binary_sensor.guest_bathroom_door_sensor') == 'off' and states('binary_sensor.water_flow_status') == 'on' }}

  - binary_sensor:
      - name: "Upstairs Bathroom Shower On"
        unique_id: upstairs_bathroom_shower_on
        state: >-
              {{ states('sensor.upstairs_bathroom_humidity_derivative') | float(0) > 1 and states('binary_sensor.upstairs_bathroom_door_sensor') == 'off' and states('binary_sensor.water_flow_status') == 'on' }}
  
  - binary_sensor:
    - name: "Basement Bathroom Shower On"
      unique_id: basement_bathroom_shower_on
      state: >-
            {{ states('sensor.basement_bathroom_humidity_derivative') | float(0) > 1.5 and states('binary_sensor.basement_bathroom_door_sensor') == 'off' and states('binary_sensor.water_flow_status') == 'on' }}